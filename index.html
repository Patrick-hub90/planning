const isWE=d=>{const x=new Date(d+'T12:00:00');return x.getDay()===0||x.getDay()===6;};
const fmt=d=>{if(!d)return"";return new Date(d+'T12:00:00').toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});};
const fmtL=d=>{if(!d)return"";return new Date(d+'T12:00:00').toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});};
const daysBetween=(a,b)=>{if(!a||!b)return 999;return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);};
const today=iso(new Date());const fbK=im=>im.replace(/[.#$/\[\]]/g,"_");
const dim=(m,y)=>new Date(y,m+1,0).getDate();const mKey=(m,y)=>y+'-'+String(m+1).padStart(2,'0');
const MIN_INT={pointFixe:7,lavage:9,corrosion:9,lavComp:7};
const TLABEL={pointFixe:"Pt Fixe",lavage:"Lavage",corrosion:"Trait. Corr.",lavComp:"Lav. Compr."};
const FLABEL={lastFlight:"Dernier Vol",lastLavage:"Dernier Lavage",lastPointFixe:"Dernier Pt Fixe",lastCorrosion:"Dernier Trait. Corrosion",lastLavComp:"Dernier Lav. Compresseur"};
const TASK_TYPES=["pointFixe","lavage","corrosion","lavComp"];

let fleet=[],pubSched=null,pendingSubs={},admins={},auditLogs=[],weeklyPwd="",curAdmin=null,isSuper=false,cv="schedule",db=null,isDark=false;
let sigName="",sigPost="",sigImage="";
let pFonts={title:18,subtitle:11,weekHeader:12,dayHeader:12,sectionLabel:9,taskName:10,taskBadge:7,signature:11};
let maxDay={pointFixe:1,lavage:1,corrosion:1,lavComp:1};
let cM=new Date().getMonth(),cY=new Date().getFullYear();

// ===== AUTH =====
function doLogin(){
  const u=document.getElementById("loginUser").value.trim().toLowerCase();
  const p=document.getElementById("loginPwd").value;
  const admin=admins[u];
  if(admin&&admin.password===p){
    curAdmin=admin;curAdmin.id=u;isSuper=admin.role==="super";
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("appWrap").style.display="block";
    document.getElementById("adminName").textContent=(admin.name||u)+(isSuper?" (Admin)":"  (Lecture)");
    document.getElementById("superBtns").style.display=isSuper?"inline":"none";
    sessionStorage.setItem("piste_admin",u);
    addLog("Connexion");render();
  } else document.getElementById("loginError").style.display="block";
}
function doLogout(){curAdmin=null;sessionStorage.removeItem("piste_admin");document.getElementById("appWrap").style.display="none";document.getElementById("loginScreen").style.display="flex";document.getElementById("loginPwd").value="";document.getElementById("loginUser").value="";}
function addLog(action){if(!db||!curAdmin)return;db.ref("auditLog").push({who:curAdmin.name||curAdmin.id,action,at:new Date().toISOString()});}

// ===== WEEKLY PASSWORD =====
function generateWeeklyPwd(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let p="";for(let i=0;i<6;i++)p+=c[Math.floor(Math.random()*c.length)];return p;}
function checkAndRotatePwd(){
  // Check if it's Monday and password needs rotation
  const now=new Date();const day=now.getDay();
  if(!db)return;
  db.ref("weeklyPasswordDate").once("value",s=>{
    const lastDate=s.val();const todayStr=today;
    if(day===1&&lastDate!==todayStr){
      const newPwd=generateWeeklyPwd();
      db.ref("weeklyPassword").set(newPwd);
      db.ref("weeklyPasswordDate").set(todayStr);
    }
  });
}

// ===== TASK STATUS =====
function taskStatus(im,ty,schedDate){
  const ac=fleet.find(a=>a.immat===im);if(!ac)return{st:"pending"};
  const lk=ty==="pointFixe"?"lastPointFixe":ty==="lavage"?"lastLavage":ty==="corrosion"?"lastCorrosion":"lastLavComp";
  const ld=ac[lk];const mi=MIN_INT[ty];
  if(ld&&ld>=schedDate){return{st:"done",doneDate:ld>schedDate?ld:null};}
  if(ty==="pointFixe"){const lf=ac.lastFlight,lp=ac.lastPointFixe;const base=(!lf&&!lp)?null:(!lp)?lf:(!lf)?lp:(lf>lp?lf:lp);if(base){const g=daysBetween(base,schedDate);if(g<mi)return{st:"skip",label:`Dern.${base===lf?" vol":" PF"} -${mi-g}j`};}}
  else{if(ld){const g=daysBetween(ld,schedDate);if(g<mi)return{st:"skip",label:`Dern.${TLABEL[ty]} -${mi-g}j`};}}
  if(schedDate<today)return{st:"missed"};
  return{st:"pending"};
}

// ===== SCHEDULE =====
function generateSchedule(){
  const nd=dim(cM,cY),sd=new Date(cY,cM,1),sc={};
  for(let i=0;i<nd;i++){sc[dk(addD(sd,i))]={pointFixe:[],lavage:[],corrosion:[],lavComp:[]};}
  const af=fleet.filter(a=>a.active),needs=[];
  af.forEach(ac=>{if(!ac.lastFlight)return;const lf=new Date(ac.lastFlight);
    const pfR=ac.lastPointFixe?new Date(ac.lastPointFixe):null,pfB=pfR&&pfR>lf?pfR:lf;
    needs.push({im:ac.immat,ty:"pointFixe",due:addD(pfB,7),pr:addD(pfB,7).getTime()});
    const lR=ac.lastLavage?new Date(ac.lastLavage):lf;needs.push({im:ac.immat,ty:"lavage",due:addD(lR,9),pr:addD(lR,9).getTime()});
    const cR=ac.lastCorrosion?new Date(ac.lastCorrosion):lf;needs.push({im:ac.immat,ty:"corrosion",due:addD(cR,9),pr:addD(cR,9).getTime()});
    if(ac.hasLavComp){const lcR=ac.lastLavComp?new Date(ac.lastLavComp):lf;needs.push({im:ac.immat,ty:"lavComp",due:addD(lcR,7),pr:addD(lcR,7).getTime()});}
  });
  needs.sort((a,b)=>a.pr-b.pr);const used=new Set();
  for(let i=0;i<needs.length;i++){const n=needs[i],k=`${n.im}-${n.ty}-${n.due.getTime()}`;if(used.has(k))continue;
    for(let j=0;j<nd;j++){const d=addD(sd,j),d2=dk(d);if(d2<today||isWE(d2)||d<n.due)continue;const s=sc[d2];if(!s)continue;
      if(n.ty==="pointFixe"&&s.pointFixe.length>=maxDay.pointFixe)continue;if(n.ty==="lavage"&&s.lavage.length>=maxDay.lavage)continue;if(n.ty==="corrosion"&&s.corrosion.length>=maxDay.corrosion)continue;if(n.ty==="lavComp"&&s.lavComp.length>=maxDay.lavComp)continue;
      if(n.ty==="pointFixe"&&(s.lavage.includes(n.im)||s.corrosion.includes(n.im)||s.lavComp.includes(n.im)))continue;
      if((n.ty==="lavage"||n.ty==="corrosion"||n.ty==="lavComp")&&s.pointFixe.includes(n.im))continue;
      if(s[n.ty].includes(n.im))continue;
      s[n.ty].push(n.im);used.add(k);const me=dk(new Date(cY,cM,nd));
      const interval=n.ty==="lavComp"||n.ty==="pointFixe"?7:9;
      const nx=addD(d,interval);if(dk(nx)<=me){needs.push({im:n.im,ty:n.ty,due:nx,pr:nx.getTime()});needs.sort((a,b)=>a.pr-b.pr);}break;
    }
  }
  sc._genDate=today;return sc;
}
function publishSchedule(){pubSched=generateSchedule();if(db){db.ref("schedules/"+mKey(cM,cY)).set(pubSched);if(pubSched[today])db.ref("todaySchedule").set(pubSched[today]);}addLog("Planning regénéré ("+MO[cM]+" "+cY+")");render();}
function loadOrGen(){if(!db){pubSched=generateSchedule();render();return;}db.ref("schedules/"+mKey(cM,cY)).once("value",s=>{const d=s.val();if(d){pubSched=d;render();}else publishSchedule();});}

// ===== VALIDATION =====
function approveSub(id){const p=pendingSubs[id];if(!p||!db)return;db.ref("fleet/"+fbK(p.immat)+"/"+p.field).set(p.value);db.ref("pendingSubmissions/"+id).remove();addLog(`Validé: ${p.immat} ${p.label}=${fmt(p.value)}`);}
function rejectSub(id){const p=pendingSubs[id];if(!db)return;db.ref("pendingSubmissions/"+id).remove();if(p)addLog(`Rejeté: ${p.immat} ${p.label}`);}
function approveAll(){Object.keys(pendingSubs).forEach(id=>approveSub(id));}

// ===== STATS =====
const tl=t=>t==="pointFixe"?"PT FIXE":t==="lavage"?"LAVAGE":t==="corrosion"?"TRAIT. CORR.":"LAV. COMPR.";
const tH=t=>t==="pointFixe"?"pf-h":t==="lavage"?"lav-h":t==="corrosion"?"tc-h":"lc-h";
const tP=t=>t==="pointFixe"?"pending-pf":t==="lavage"?"pending-lav":t==="corrosion"?"pending-tc":"pending-lc";
const tC=t=>t==="pointFixe"?{c:"var(--pf)",bg:"var(--pf-bg)",bd:"var(--pf-bd)"}:t==="lavage"?{c:"var(--lav)",bg:"var(--lav-bg)",bd:"var(--lav-bd)"}:t==="corrosion"?{c:"var(--tc)",bg:"var(--tc-bg)",bd:"var(--tc-bd)"}:{c:"var(--lc)",bg:"var(--lc-bg)",bd:"var(--lc-bd)"};

function getSt(){if(!pubSched)return{pf:0,lv:0,co:0,lc:0,dn:0,ms:0,total:0,act:0,sz:fleet.length,pend:0};
  let pf=0,lv=0,co=0,lcc=0,dn=0,ms=0,total=0;
  Object.entries(pubSched).forEach(([dt,s])=>{if(!s||dt.startsWith("_"))return;
    TASK_TYPES.forEach(ty=>{if(!s[ty])return;s[ty].forEach(im=>{total++;const r=taskStatus(im,ty,dt);if(r.st==="done")dn++;else if(r.st==="missed")ms++;});});
    pf+=(s.pointFixe||[]).length;lv+=(s.lavage||[]).length;co+=(s.corrosion||[]).length;lcc+=(s.lavComp||[]).length;
  });
  return{pf,lv,co,lc:lcc,dn,ms,total,act:fleet.filter(a=>a.active&&a.lastFlight).length,sz:fleet.length,pend:Object.keys(pendingSubs).length};}

// ===== RENDER =====
function rSt(){const s=getSt();
  document.getElementById("stBar").innerHTML=[
    {l:"Actifs",v:s.act,c:"var(--pf)"},{l:"Lavages",v:s.lv,c:"var(--lav)"},{l:"Trait.Corr.",v:s.co,c:"var(--tc)"},{l:"Lav.Comp.",v:s.lc,c:"var(--lc)"},{l:"Réalisés",v:s.dn+"/"+s.total,c:"var(--ok)"},{l:"Manqués",v:s.ms,c:s.ms?"var(--dn)":"var(--ok)"}
  ].map(x=>`<div class="stat"><div class="stat-label">${x.l}</div><div class="stat-value" style="color:${x.c}">${x.v}</div></div>`).join("");
  document.getElementById("rb").textContent=s.ms;document.getElementById("rb").style.display=s.ms?"inline":"none";
  document.getElementById("vb").textContent=s.pend;document.getElementById("vb").style.display=s.pend?"inline":"none";
  document.getElementById("pT").textContent=`PLANNING DE LAVAGE - POINT FIXE - TRAITEMENT CORROSION — ${MO[cM].toUpperCase()} ${cY}`;
  document.getElementById("pS").textContent=`DU 01/${String(cM+1).padStart(2,'0')}/${cY} AU ${dim(cM,cY)}/${String(cM+1).padStart(2,'0')}/${cY} · ${s.act} aéronefs · ${fmtL(today)}`;
  let sh="";if(sigName||sigPost||sigImage){sh+=`<div style="text-align:right;margin-top:12px">`;if(sigImage)sh+=`<img src="${sigImage}" style="max-height:60px;display:block;margin-left:auto;margin-bottom:3px">`;if(sigName)sh+=`<div style="font-size:10px;font-weight:800">${sigName}</div>`;if(sigPost)sh+=`<div style="font-size:8px;color:#64748b">${sigPost}</div>`;sh+=`</div>`;}
  document.getElementById("sigA").innerHTML=sh;}

function rSch(){
  if(!pubSched){document.getElementById("vSch").innerHTML=`<div style="text-align:center;padding:30px;color:var(--text2)">Chargement...</div>`;return;}
  const nd=dim(cM,cY),sd=new Date(cY,cM,1),le=new Date(cY,cM,nd);
  let mon=new Date(sd);while(mon.getDay()!==1)mon.setDate(mon.getDate()-1);
  let fri=new Date(le);while(fri.getDay()!==5)fri.setDate(fri.getDate()+1);
  const wks=[];let cur=new Date(mon);while(cur<=fri){const w=[];for(let i=0;i<5;i++){w.push({d:dk(cur),in:cur.getMonth()===cM&&cur.getFullYear()===cY});cur.setDate(cur.getDate()+1);}cur.setDate(cur.getDate()+2);wks.push(w);}

  let h=`<div class="month-nav no-print"><button onclick="pM()">◀</button><div class="month-label">${MO[cM]} ${cY}</div><button onclick="nM()">▶</button>
    ${isSuper?`<button onclick="if(confirm('Recalculer le planning à partir d\\'aujourd\\'hui ?'))publishSchedule()" class="no-print" style="margin-left:auto;width:38px;height:38px;border-radius:10px;border:none;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;cursor:pointer;font-size:20px;font-weight:700;box-shadow:0 4px 12px rgba(59,130,246,.3);display:flex;align-items:center;justify-content:center" title="Regénérer le planning">↻</button>`:''}</div>`;
  h+=`<div class="legend-bar no-print"><div class="legend-item"><div class="ld ld-p"></div>À faire</div><div class="legend-item"><div class="ld ld-d"></div>✓Fait</div><div class="legend-item"><div class="ld ld-m"></div>✗Manqué</div><div class="legend-item"><div class="ld ld-s"></div>Inutile</div></div>`;
  const pc=Object.keys(pendingSubs).length;
  if(pc&&isSuper)h+=`<div onclick="sv('validation')" style="background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:8px;padding:8px 14px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;font-weight:800;font-size:12px;color:var(--warn)" class="no-print"><span>📋 ${pc} saisie(s) en attente</span><span>→</span></div>`;

  let weekIdx=0;const weeksInfo=[];
  // Filter weeks with content
  wks.forEach(w=>{
    const inW=w.filter(x=>x.in);
    // Check if week has any tasks
    let weekHasTasks=false;
    w.forEach(({d,in:inM})=>{if(!inM)return;const sl=pubSched[d];if(!sl)return;if(TASK_TYPES.some(ty=>sl[ty]&&sl[ty].length))weekHasTasks=true;});
    // Skip weeks entirely in past with no tasks
    const allPast=inW.every(x=>x.d<today);
    if(allPast&&!weekHasTasks)return;

    const ws=inW.length?inW[0].d:w[0].d,we=inW.length?inW[inW.length-1].d:w[4].d;
    let wDone=0,wTotal=0;
    w.forEach(({d,in:inM})=>{if(!inM)return;const sl=pubSched[d];if(!sl)return;TASK_TYPES.forEach(ty=>{if(!sl[ty])return;sl[ty].forEach(im=>{const r=taskStatus(im,ty,d);if(r.st!=="skip"){wTotal++;if(r.st==="done")wDone++;}});});});
    const wPct=wTotal?Math.round(wDone/wTotal*100):0;const bc=wPct>=80?"var(--ok)":wPct>=40?"var(--tc)":"var(--dn)";
    weeksInfo.push({idx:weekIdx,label:`Sem. ${fmt(ws)} — ${fmt(we)}`,ws,we});
    h+=`<div class="wblock" data-week="${weekIdx}"><div class="wheader"><span class="wheader-label">Sem. ${fmt(ws)} — ${fmt(we)}</span><div class="wprog">${wDone}/${wTotal}<div class="wprog-bar"><div class="wprog-fill" style="width:${wPct}%;background:${bc}"></div></div>${wPct}%</div></div><div class="wgrid">`;
    // ... day columns rendered below
    w.forEach(({d,in:inM})=>{
      const dt=new Date(d+'T12:00:00'),isT=d===today,isP=d<today;
      if(!inM){h+=`<div class="dcol outside"><div class="dhead">${WD[dt.getDay()]} ${dt.getDate()}</div></div>`;return;}
      const sl=pubSched[d]||{pointFixe:[],lavage:[],corrosion:[],lavComp:[]};
      const hasTasks=TASK_TYPES.some(ty=>sl[ty]&&sl[ty].length);
      // Skip past empty days
      if(isP&&!isT&&!hasTasks){h+=`<div class="dcol" style="opacity:.2"><div class="dhead">${WD[dt.getDay()]} ${dt.getDate()}</div><div style="text-align:center;margin-top:12px;font-size:7px;color:var(--text3);font-weight:700">PASSÉ</div></div>`;return;}

      h+=`<div class="dcol${isT?' today':''}"><div class="dhead">${WD[dt.getDay()]} ${dt.getDate()}</div>`;
      TASK_TYPES.forEach(ty=>{
        if(!sl[ty]||!sl[ty].length)return;
        h+=`<div class="tsec"><div class="tsec-head ${tH(ty)}">${tl(ty)}</div>`;
        sl[ty].forEach(im=>{const r=taskStatus(im,ty,d);let cls,ico,bdg="";
          if(r.st==="done"){cls="done";ico="✓";bdg=r.doneDate?`<span class="tp-badge" style="background:var(--ok);color:#fff">FAIT ${fmt(r.doneDate)}</span>`:`<span class="tp-badge" style="background:var(--ok);color:#fff">FAIT</span>`;}
          else if(r.st==="missed"){cls="missed";ico="✗";bdg=`<span class="tp-badge" style="background:var(--dn);color:#fff">MANQUÉ</span>`;}
          else if(r.st==="skip"){cls="skip";ico="—";bdg=`<span class="tp-badge" style="background:var(--skip);color:#fff">${r.label}</span>`;}
          else{cls=`pending ${tP(ty)}`;ico="○";}
          h+=`<div class="tp ${cls}"><div class="tp-ico">${ico}</div><span class="tp-name">${im}</span>${bdg}</div>`;
        });h+=`</div>`;
      });
      if(!hasTasks)h+=`<div style="font-size:8px;color:var(--text3);margin-top:12px;text-align:center">—</div>`;
      h+=`</div>`;
    });h+=`</div></div>`;weekIdx++;
  });
  document.getElementById("vSch").innerHTML=h;
  // Populate print scope dropdown
  const sel=document.getElementById("printScope");if(sel){sel.innerHTML=`<option value="all">Mois complet</option>`;weeksInfo.forEach(w=>{sel.innerHTML+=`<option value="${w.idx}">${w.label}</option>`;});}
}

    <button class="btn btn-primary btn-sm" onclick="bulkEdit()">Appliquer</button>
    <button class="btn btn-sm" onclick="bkAll(true)">✓ Tout</button><button class="btn btn-sm" onclick="bkAll(false)">✕ Rien</button></div></div>`;}
  h+=`<div style="overflow-x:auto;background:var(--bg2);border-radius:10px;border:1px solid var(--border);box-shadow:var(--sh)"><table><thead><tr>${isSuper?'<th style="width:30px"><input type="checkbox" onchange="bkAll(this.checked)" style="width:14px;height:14px;cursor:pointer"></th>':''}<th>Actif</th><th>Immat</th><th>Type</th><th>LC</th><th>Vol</th><th>Lavage</th><th>Corrosion</th><th>Pt Fixe</th><th>Lav.Comp</th>${isSuper?'<th></th>':''}</tr></thead><tbody>`;
  fleet.forEach((a,i)=>{
    if(isSuper){
      h+=`<tr style="${!a.active?'opacity:.35':''}"><td><input type="checkbox" class="bk-c" data-im="${a.immat}" style="width:14px;height:14px;cursor:pointer"></td><td><button class="toggle ${a.active?'on':'off'}" onclick="tA(${i})"></button></td><td style="font-weight:800">${a.immat}</td><td><span class="tag" style="background:${a.type==='ULM'?'var(--pf-bg)':'#f5f3ff'};color:${a.type==='ULM'?'var(--pf-dark)':'#7c3aed'}">${a.type}</span></td><td><input type="checkbox" ${a.hasLavComp?'checked':''} onchange="tLC(${i},this.checked)" style="width:14px;height:14px;cursor:pointer"></td><td><input type="date" value="${a.lastFlight||''}" onchange="uFld(${i},'lastFlight',this.value)" style="width:115px"></td><td><input type="date" value="${a.lastLavage||''}" onchange="uFld(${i},'lastLavage',this.value)" style="width:115px"></td><td><input type="date" value="${a.lastCorrosion||''}" onchange="uFld(${i},'lastCorrosion',this.value)" style="width:115px"></td><td><input type="date" value="${a.lastPointFixe||''}" onchange="uFld(${i},'lastPointFixe',this.value)" style="width:115px"></td><td><input type="date" value="${a.lastLavComp||''}" onchange="uFld(${i},'lastLavComp',this.value)" style="width:115px"></td><td><button class="btn btn-dn btn-xs" onclick="rmA(${i})">✕</button></td></tr>`;
    } else {
      h+=`<tr style="${!a.active?'opacity:.35':''}"><td>${a.active?'✓':'✕'}</td><td style="font-weight:800">${a.immat}</td><td><span class="tag" style="background:${a.type==='ULM'?'var(--pf-bg)':'#f5f3ff'};color:${a.type==='ULM'?'var(--pf-dark)':'#7c3aed'}">${a.type}</span></td><td>${a.hasLavComp?'✓':'—'}</td><td>${a.lastFlight?fmt(a.lastFlight):'—'}</td><td>${a.lastLavage?fmt(a.lastLavage):'—'}</td><td>${a.lastCorrosion?fmt(a.lastCorrosion):'—'}</td><td>${a.lastPointFixe?fmt(a.lastPointFixe):'—'}</td><td>${a.lastLavComp?fmt(a.lastLavComp):'—'}</td></tr>`;
    }
  });
  h+=`</tbody></table></div>`;document.getElementById("vFlt").innerHTML=h;}

function rVal(){const entries=Object.entries(pendingSubs);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="font-size:15px;font-weight:900">Validations (${entries.length})</h2>`;
  if(entries.length&&isSuper)h+=`<button class="btn btn-ok btn-sm" onclick="approveAll()">✓ Tout valider</button>`;
  h+=`</div>`;
  if(!entries.length)h+=`<div style="background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:10px;padding:30px;text-align:center"><div style="font-size:28px;margin-bottom:6px">✅</div><div style="font-weight:900;color:var(--ok-dark)">Aucune saisie en attente</div></div>`;
  else entries.sort((a,b)=>(b[1].submittedAt||"").localeCompare(a[1].submittedAt||"")).forEach(([id,p])=>{
    h+=`<div class="pend-card"><div style="display:flex;align-items:center;gap:10px"><span style="font-weight:900;font-size:14px">${p.immat}</span><span class="tag" style="background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)">${p.label||p.field}</span><span style="font-weight:800">${fmt(p.value)}</span><span style="font-size:10px;color:var(--text3)">${p.submittedAt?new Date(p.submittedAt).toLocaleString("fr-FR"):''}</span></div>
    ${isSuper?`<div style="display:flex;gap:5px"><button class="btn btn-ok btn-sm" onclick="approveSub('${id}')">✓</button><button class="btn btn-dn btn-sm" onclick="rejectSub('${id}')">✕</button></div>`:'<span style="font-size:10px;color:var(--text3)">En attente</span>'}</div>`;
  });
  document.getElementById("vVal").innerHTML=h;}

function rRet(){let missed=[];
  if(pubSched)Object.entries(pubSched).forEach(([dt,s])=>{if(!s||dt.startsWith("_"))return;TASK_TYPES.forEach(ty=>{if(!s[ty])return;s[ty].forEach(im=>{if(taskStatus(im,ty,dt).st==="missed")missed.push({im,ty,dt});});});});
  let h=`<h2 style="font-size:15px;font-weight:900;margin-bottom:12px">Manqués</h2>`;
  if(!missed.length)h+=`<div style="background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:10px;padding:30px;text-align:center"><div style="font-size:28px;margin-bottom:6px">✅</div><div style="font-weight:900;color:var(--ok-dark)">Tout est à jour</div></div>`;
  else{const g={};TASK_TYPES.forEach(ty=>{g[ty]=[];});missed.forEach(m=>g[m.ty].push(m));
    TASK_TYPES.forEach(ty=>{if(!g[ty].length)return;
      h+=`<div class="ocard"><div class="ohead"><span style="font-weight:900;color:var(--dn)">${tl(ty)} (${g[ty].length})</span></div><table><thead><tr><th>Aéronef</th><th>Prévu</th><th>Retard</th></tr></thead><tbody>`;
      g[ty].forEach(m=>{const late=daysBetween(m.dt,today);h+=`<tr><td style="font-weight:800">${m.im}</td><td style="color:var(--dn);font-weight:700">${fmt(m.dt)}</td><td><span style="background:var(--dn-bg);color:var(--dn);padding:2px 7px;border-radius:4px;font-weight:900;font-size:10px">+${late}j</span></td></tr>`;});
      h+=`</tbody></table></div>`;});}
  document.getElementById("vRet").innerHTML=h;}

function rAdm(){if(!isSuper){document.getElementById("vAdm").innerHTML=`<div style="text-align:center;padding:30px;color:var(--text2)"><div style="font-size:28px;margin-bottom:8px">🔒</div><div style="font-weight:800">Accès réservé à l'administrateur principal</div></div>`;return;}
  let h=`<h2 style="font-size:15px;font-weight:900;margin-bottom:14px">Administration</h2>`;
  // Weekly password
  h+=`<div class="pwd-card"><h3>🔑 Mot de passe hebdomadaire (mobile)</h3>
    <p style="font-size:11px;color:var(--text2)">Généré automatiquement chaque lundi. À communiquer au personnel de permanence.</p>
    <div class="pwd-display" id="pwdDisp">${weeklyPwd}</div>
    <div style="display:flex;gap:6px"><button class="btn btn-primary btn-sm" onclick="newPwd()">Nouveau mot de passe</button>
    <input type="text" id="customPwd" placeholder="Ou saisir manuellement" style="flex:1;padding:7px">
    <button class="btn btn-sm" onclick="setPwd()">Appliquer</button></div></div>`;
  // Admin accounts
  h+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:var(--sh)"><h3 style="font-size:13px;font-weight:800;margin-bottom:10px">👤 Comptes</h3>
  <p style="font-size:10px;color:var(--text2);margin-bottom:10px">Admin = lecture + écriture · Lecture = consultation uniquement</p>`;
  Object.entries(admins).forEach(([id,a])=>{
    const role=a.role==="super"?"Admin":"Lecture";const roleCol=a.role==="super"?"var(--pf)":"var(--text3)";
    h+=`<div style="padding:10px 0;border-bottom:1px solid var(--bg3)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div><span style="font-weight:800">${a.name||id}</span> <span style="font-size:9px;color:var(--text3)">ID: ${id}</span> <span class="tag" style="font-size:9px;background:var(--bg3);color:${roleCol}">${role}</span></div>
        ${id!=='admin'?`<button class="btn btn-dn btn-xs" onclick="rmAdmin('${id}')">Suppr.</button>`:''}
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="password" id="pwd_${id}" placeholder="Nouveau mot de passe" style="flex:1;padding:6px 10px;font-size:11px">
        <button class="btn btn-sm" onclick="changePwd('${id}')">Modifier MDP</button>
      </div>
    </div>`;
  });
  h+=`<div class="mrow" style="margin-top:10px"><div class="field"><label>ID</label><input type="text" id="naId" placeholder="identifiant"></div><div class="field"><label>Nom</label><input type="text" id="naName" placeholder="Nom complet"></div><div class="field"><label>Mot de passe</label><input type="text" id="naPwd" placeholder="mot de passe"></div><button class="btn btn-primary btn-sm" onclick="addAdmin()">Créer (lecture)</button></div></div>`;
  // Signature
  h+=`<div class="sig-area"><h3 style="font-size:13px;font-weight:800;margin-bottom:8px">Signature PDF</h3>
    <div class="field" style="margin-bottom:6px"><label>Image</label><input type="file" accept="image/*" onchange="uSig(event)" style="font-size:11px"></div>
    ${sigImage?`<div style="margin-bottom:6px"><img src="${sigImage}" style="max-height:50px;border-radius:6px;border:1px solid var(--border)"><br><button class="btn btn-dn btn-xs" style="margin-top:3px" onclick="rSig()">Suppr.</button></div>`:''}
    <div class="field" style="margin-bottom:6px"><label>Nom</label><input type="text" id="sN" value="${sigName}" style="width:100%;padding:7px" onchange="sSig()"></div>
    <div class="field" style="margin-bottom:6px"><label>Poste</label><input type="text" id="sP" value="${sigPost}" style="width:100%;padding:7px" onchange="sSig()"></div></div>`;
  // Print fonts
  h+=`<div style="margin-top:14px;padding:16px;background:var(--bg2);border-radius:10px;border:1px solid var(--border);box-shadow:var(--sh)"><h3 style="font-size:13px;font-weight:800;margin-bottom:10px">📋 Max tâches par jour</h3>
  <p style="font-size:10px;color:var(--text2);margin-bottom:10px">Nombre maximum de chaque type de tâche pouvant être programmé sur un même jour</p>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">
  <div><label style="font-size:10px;color:var(--text2);font-weight:700;display:block;margin-bottom:2px">Point Fixe</label><input type="number" id="md_pointFixe" value="${maxDay.pointFixe}" min="1" max="10" style="width:100%;padding:6px 8px"></div>
  <div><label style="font-size:10px;color:var(--text2);font-weight:700;display:block;margin-bottom:2px">Lavage</label><input type="number" id="md_lavage" value="${maxDay.lavage}" min="1" max="10" style="width:100%;padding:6px 8px"></div>
  <div><label style="font-size:10px;color:var(--text2);font-weight:700;display:block;margin-bottom:2px">Trait. Corrosion</label><input type="number" id="md_corrosion" value="${maxDay.corrosion}" min="1" max="10" style="width:100%;padding:6px 8px"></div>
  <div><label style="font-size:10px;color:var(--text2);font-weight:700;display:block;margin-bottom:2px">Lav. Compresseur</label><input type="number" id="md_lavComp" value="${maxDay.lavComp}" min="1" max="10" style="width:100%;padding:6px 8px"></div>
  </div><button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="saveMaxDay()">Enregistrer</button></div>`;
  // Print fonts
  const pfl=[{k:"title",l:"Titre"},{k:"subtitle",l:"Sous-titre"},{k:"weekHeader",l:"En-tête semaine"},{k:"dayHeader",l:"En-tête jour"},{k:"sectionLabel",l:"Label tâche (PF/LAV/TC)"},{k:"taskName",l:"Nom aéronef"},{k:"taskBadge",l:"Badge statut"},{k:"signature",l:"Signature"}];
  h+=`<div style="margin-top:14px;padding:16px;background:var(--bg2);border-radius:10px;border:1px solid var(--border);box-shadow:var(--sh)"><h3 style="font-size:13px;font-weight:800;margin-bottom:10px">🖨 Polices Export PDF (px)</h3>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px">`;
  pfl.forEach(f=>{h+=`<div><label style="font-size:10px;color:var(--text2);font-weight:700;display:block;margin-bottom:2px">${f.l}</label><input type="number" id="pf_${f.k}" value="${pFonts[f.k]}" min="4" max="40" style="width:100%;padding:6px 8px"></div>`;});
  h+=`</div><button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="savePFonts()">Enregistrer les polices</button></div>`;
  // Backup
  h+=`<div style="margin-top:12px;padding:14px;background:var(--bg2);border-radius:10px;border:1px solid var(--border)"><button class="btn btn-sm" onclick="xBk()">💾 Backup</button> <button class="btn btn-sm" onclick="document.getElementById('iF').click()">📂 Importer</button><input type="file" id="iF" accept=".json" style="display:none" onchange="iBk(event)"></div>`;
  document.getElementById("vAdm").innerHTML=h;}

function rLog(){
  let h=`<h2 style="font-size:15px;font-weight:900;margin-bottom:12px">Journal d'activité</h2>`;
  if(!auditLogs.length)h+=`<p style="color:var(--text2)">Aucune activité enregistrée</p>`;
  else{h+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--sh)">`;
    auditLogs.forEach(l=>{h+=`<div class="log-entry"><span class="log-who">${l.who||'—'}</span><span class="log-when">${l.at?new Date(l.at).toLocaleString("fr-FR"):''}</span><span class="log-what">${l.action||''}</span></div>`;});
    h+=`</div>`;}
  document.getElementById("vLog").innerHTML=h;}

// Admin account management
function addAdmin(){const id=document.getElementById("naId").value.trim().toLowerCase();const name=document.getElementById("naName").value.trim();const pwd=document.getElementById("naPwd").value;if(!id||!pwd)return;if(db)db.ref("admins/"+id).set({name:name||id,password:pwd,role:"reader"});addLog("Créé compte lecture: "+id);document.getElementById("naId").value="";document.getElementById("naName").value="";document.getElementById("naPwd").value="";rAdm();}
function rmAdmin(id){if(!confirm("Supprimer le compte "+id+" ?"))return;if(db)db.ref("admins/"+id).remove();addLog("Supprimé compte: "+id);}
function changePwd(id){const el=document.getElementById("pwd_"+id);if(!el)return;const pwd=el.value.trim();if(!pwd){alert("Saisissez un mot de passe");return;}if(db)db.ref("admins/"+id+"/password").set(pwd);addLog("MDP modifié pour: "+id);el.value="";rAdm();}

// Weekly password
function newPwd(){const p=generateWeeklyPwd();if(db){db.ref("weeklyPassword").set(p);db.ref("weeklyPasswordDate").set(today);}addLog("Nouveau MDP hebdo généré");rAdm();}
function setPwd(){const p=document.getElementById("customPwd").value.trim();if(!p)return;if(db){db.ref("weeklyPassword").set(p);db.ref("weeklyPasswordDate").set(today);}addLog("MDP hebdo modifié manuellement");rAdm();}

// Signature
function sSig(){sigName=document.getElementById("sN").value;sigPost=document.getElementById("sP").value;if(db){db.ref("config/sigName").set(sigName);db.ref("config/sigPost").set(sigPost);}addLog("Signature modifiée");}
function uSig(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{sigImage=ev.target.result;if(db)db.ref("config/sigImage").set(sigImage);rAdm();};r.readAsDataURL(f);}
function rSig(){sigImage="";if(db)db.ref("config/sigImage").remove();rAdm();}
function xBk(){const d=JSON.stringify({fleet,sigName,sigPost,sigImage},null,2);const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([d],{type:"application/json"}));a.download="piste_backup.json";a.click();}
function iBk(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.fleet){fleet=d.fleet;sigName=d.sigName||"";sigPost=d.sigPost||"";sigImage=d.sigImage||"";if(db){const o={};fleet.forEach(a=>{o[fbK(a.immat)]=a;});db.ref("fleet").set(o);db.ref("config").set({sigName,sigPost,sigImage});}addLog("Import backup");publishSchedule();}}catch(e){}};r.readAsText(f);e.target.value="";}

// Print fonts
function applyPrintFonts(){
  let s=document.getElementById("dynPrintStyle");
  if(!s){s=document.createElement("style");s.id="dynPrintStyle";document.head.appendChild(s);}
  s.textContent=`@media print{
    .print-header h1{font-size:${pFonts.title}px!important}
    .print-header p{font-size:${pFonts.subtitle}px!important}
    .wheader-label{font-size:${pFonts.weekHeader}px!important}
    .dhead{font-size:${pFonts.dayHeader}px!important}
    .tsec-head{font-size:${pFonts.sectionLabel}px!important}
    .tp,.tp-name{font-size:${pFonts.taskName}px!important}
    .tp-badge{font-size:${pFonts.taskBadge}px!important}
    #sigA,#sigA *{font-size:${pFonts.signature}px!important}
    #sigA div[style*="font-weight:800"]{font-size:${pFonts.signature}px!important}
  }`;
}
function saveMaxDay(){
  ["pointFixe","lavage","corrosion","lavComp"].forEach(k=>{const el=document.getElementById("md_"+k);if(el)maxDay[k]=Math.max(1,parseInt(el.value)||1);});
  if(db)db.ref("config/maxDay").set(maxDay);
  addLog("Max tâches/jour modifié: PF="+maxDay.pointFixe+" LAV="+maxDay.lavage+" TC="+maxDay.corrosion+" LC="+maxDay.lavComp);
}
function savePFonts(){
  const fields=["title","subtitle","weekHeader","dayHeader","sectionLabel","taskName","taskBadge","signature"];
  fields.forEach(f=>{const el=document.getElementById("pf_"+f);if(el)pFonts[f]=parseInt(el.value)||pFonts[f];});
  if(db)db.ref("config/pFonts").set(pFonts);
  applyPrintFonts();addLog("Polices export modifiées");
}
// Nav
function doPrint(){
  const scope=document.getElementById("printScope").value;
  const blocks=document.querySelectorAll(".wblock[data-week]");
  // Update title for week scope
  const pTitle=document.getElementById("pT");
  const pSub=document.getElementById("pS");
  const baseTitle=`PLANNING DE LAVAGE - POINT FIXE - TRAITEMENT CORROSION`;
  if(scope==="all"){
    blocks.forEach(b=>{b.style.display="";});
    pTitle.textContent=`${baseTitle} — ${MO[cM].toUpperCase()} ${cY}`;
    pSub.textContent=`DU 01/${String(cM+1).padStart(2,'0')}/${cY} AU ${dim(cM,cY)}/${String(cM+1).padStart(2,'0')}/${cY} · ${fleet.filter(a=>a.active).length} aéronefs · ${fmtL(today)}`;
  } else {
    blocks.forEach(b=>{b.style.display=b.dataset.week===scope?"":"none";});
    const sel=document.getElementById("printScope");const label=sel.options[sel.selectedIndex].text;
    pTitle.textContent=`${baseTitle}`;
    pSub.textContent=`${label.toUpperCase()} — ${MO[cM]} ${cY} · ${fleet.filter(a=>a.active).length} aéronefs · ${fmtL(today)}`;
  }
  // Force schedule view
  sv("schedule");
  setTimeout(()=>{window.print();blocks.forEach(b=>{b.style.display="";});},200);
}
function pM(){cM--;if(cM<0){cM=11;cY--;}pubSched=null;loadOrGen();}
function nM(){cM++;if(cM>11){cM=0;cY++;}pubSched=null;loadOrGen();}
function sv(v){if((v==="admin"||v==="validation")&&!isSuper){v="schedule";}cv=v;["Sch","Flt","Ret","Val","Adm","Log"].forEach(id=>{document.getElementById("v"+id).style.display="none";const b=document.getElementById("b"+id);if(b)b.classList.remove("active");});const m={schedule:"Sch",fleet:"Flt",retards:"Ret",validation:"Val",admin:"Adm",logs:"Log"};document.getElementById("v"+m[v]).style.display="block";const b2=document.getElementById("b"+m[v]);if(b2)b2.classList.add("active");if(v==="admin")rAdm();if(v==="validation")rVal();if(v==="logs")rLog();}
function render(){rSt();rFlt();rSch();rRet();rVal();}

// Fleet ops
function uFld(i,f,v){fleet[i][f]=v||null;if(db)db.ref("fleet/"+fbK(fleet[i].immat)+"/"+f).set(v||null);addLog(`${fleet[i].immat}: ${FLABEL[f]||f}=${v?fmt(v):'vide'}`);render();}
function tLC(i,v){fleet[i].hasLavComp=v;if(db)db.ref("fleet/"+fbK(fleet[i].immat)+"/hasLavComp").set(v);render();}
function tA(i){fleet[i].active=!fleet[i].active;if(db)db.ref("fleet/"+fbK(fleet[i].immat)+"/active").set(fleet[i].active);addLog(`${fleet[i].immat}: ${fleet[i].active?'Activé':'Désactivé'}`);render();}
function rmA(i){if(!confirm("Supprimer "+fleet[i].immat+" ?"))return;const im=fleet[i].immat;fleet.splice(i,1);if(db)db.ref("fleet/"+fbK(im)).remove();addLog("Supprimé: "+im);render();}
function addA(){const im=document.getElementById("nI").value.trim().toUpperCase(),ty=document.getElementById("nT").value.trim()||"ULM",lc=document.getElementById("nLC").checked;if(!im||fleet.find(a=>a.immat===im))return;const ac={immat:im,type:ty,active:true,hasLavComp:lc,lastFlight:null,lastLavage:null,lastCorrosion:null,lastPointFixe:null,lastLavComp:null};fleet.push(ac);if(db)db.ref("fleet/"+fbK(im)).set(ac);document.getElementById("aR").style.display="none";document.getElementById("nI").value="";addLog("Ajouté: "+im);render();}
function bulkEdit(){const f=document.getElementById("bF").value,d=document.getElementById("bD").value;if(!d){alert("Date?");return;}const sel=[...document.querySelectorAll(".bk-c:checked")].map(c=>c.dataset.im);if(!sel.length){alert("Cochez des aéronefs");return;}if(!confirm(`Appliquer ${FLABEL[f]||f}=${fmt(d)} à ${sel.length} aéronef(s)?`))return;sel.forEach(im=>{const ac=fleet.find(a=>a.immat===im);if(ac){ac[f]=d;if(db)db.ref("fleet/"+fbK(im)+"/"+f).set(d);}});addLog(`Modif groupée: ${FLABEL[f]||f}=${fmt(d)} sur ${sel.length} aéronefs`);render();}
function bkAll(v){document.querySelectorAll(".bk-c").forEach(c=>{c.checked=v;});}

initFB();applyPrintFonts();
</script>
</body>
</html>
