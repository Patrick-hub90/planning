// Global sync status
window.__syncStatus={lastSync:0,active:false,sheets:0};

function useAutoSync(){
  const {config,orders,syncFromSheet,spaceCode}=useContext(Ctx);
  const lastRef=useRef(0);
  const syncingRef=useRef(false);

  useEffect(()=>{
    const run=async()=>{
      if(syncingRef.current)return;
      const sheets=config.sheetUrls||[];
      const mappings=config.sheetMappings||{};
      const active=sheets.filter(s=>mappings[s.url]&&mappings[s.url]._tab&&mappings[s.url].orderNumber);
      window.__syncStatus.sheets=active.length;
      if(!active.length)return;
      if(Date.now()-lastRef.current<30000)return;
      lastRef.current=Date.now();
      syncingRef.current=true;
      window.__syncStatus.active=true;

      try{
        for(const sh of active){
          const m=mappings[sh.url];
          const r=await fetch('/api/sheets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sheetUrl:sh.url,sheetName:m._tab})});
          const data=await r.json();
          if(data.error||!data.rows)continue;

          const mapSt=(txt)=>{if(!txt)return S.NEW;const t=norm(txt);if(t.includes('livraison'))return S.LIVRAISON;if(t.includes('livre'))return S.LIVRE;if(t.includes('injoignable'))return S.INJOIGNABLE;if(t.includes('rappel'))return S.RAPPELE;if(t.includes('report'))return S.REPORTE;if(t.includes('annul'))return S.ANNULE;return S.NEW};

          const sheetOrders=data.rows.map((row,idx)=>{
            const rawNum=row[m.orderNumber]||'';
            if(!rawNum)return null;
            const orderNum=rawNum.startsWith('#')?rawNum:'#'+rawNum;
            const st=m.statut?mapSt(row[m.statut]):S.NEW;
            const comment=m.commentaire?row[m.commentaire]||'':'';
            const now=new Date();
            const createdAt=new Date(now.getTime()-(data.rows.length-idx)*1000).toISOString();
            return{id:('s'+Math.random().toString(36).slice(2,10)),orderNumber:orderNum,fullName:row[m.fullName]||'',phone:row[m.phone]||'',whatsapp:row[m.whatsapp]||row[m.phone]||'',productName:'',sheetProductName:row[m.productName]||sh.label||'',totalPrice:Number(String(row[m.totalPrice]||'0').replace(/[^0-9]/g,''))||0,quantity:Number(row[m.quantity])||1,city:row[m.city]||'',createdAt,updatedAt:createdAt,status:st,attempts:st!==S.NEW?[{status:st,ts:createdAt,comment}]:[],timerExp:null,reportDate:null,comment,pricePaid:st===S.LIVRE?Number(String(row[m.totalPrice]||'0').replace(/[^0-9]/g,''))||0:null,deliveryZone:'',deliveryCost:0};
          }).filter(Boolean);

          // syncFromSheet handles: update existing + add new + dedup
          syncFromSheet(sheetOrders);
        }
        window.__syncStatus.lastSync=Date.now();
      }catch(e){}
      syncingRef.current=false;
      window.__syncStatus.active=false;
    };
    const t=setInterval(run,30000);
    setTimeout(run,3000);
    return()=>clearInterval(t);
  },[config.sheetUrls,config.sheetMappings]);


}

// ============== ACCOUNTS MANAGER ==============
function AccountsManager(){
  const [accounts,setAccounts]=useState([]);
  const [newCode,setNewCode]=useState('');
  const [newName,setNewName]=useState('');

  const [editing,setEditing]=useState(null);
  const [loaded,setLoaded]=useState(false);

  // Load from Firebase + auto-migrate from old system
  useEffect(()=>{
    if(!db){setLoaded(true);return}
    const unsub=db.collection('global').doc('accounts').onSnapshot(snap=>{
      if(snap.exists&&snap.data().list&&snap.data().list.length>0){
        setAccounts(snap.data().list);
      }else{
        // Auto-migrate: read old spaces + metadata and create accounts
        // No accounts yet — manager will create them
      }
      setLoaded(true);
    },()=>{setLoaded(true)});
    return()=>unsub();
  },[]);

  const saveToFirebase=(list)=>{
    setAccounts(list);
    if(db)db.collection('global').doc('accounts').set({list}).catch(()=>{});
  };

  const addAccount=()=>{
    const name=newName.trim();
    const code=newCode.trim().toUpperCase();
    if(!name){alert('Nom obligatoire');return}
    if(!code){alert('Code obligatoire');return}
    if(code==='MANAGER'){alert('MANAGER est reserve');return}
    if(accounts.find(a=>a.code===code)){alert('Ce code existe deja');return}
    if(accounts.find(a=>a.name===name)){alert('Ce nom existe deja');return}
    saveToFirebase([...accounts,{code,name,space:name,createdAt:new Date().toISOString()}]);
    setNewCode('');setNewName('');
  };

  const deleteAccount=(code)=>{
    if(!confirm('Supprimer le compte '+code+' ?'))return;
    saveToFirebase(accounts.filter(a=>a.code!==code));
  };

  const updateAccount=(oldCode,updates)=>{
    saveToFirebase(accounts.map(a=>a.code===oldCode?{...a,...updates}:a));
    setEditing(null);
  };

  return(
    <div style={{margin:'8px 12px',background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:700}}>Comptes</div>
        <span style={{fontSize:12,color:'var(--muted)',fontWeight:600}}>{accounts.length} compte{accounts.length>1?'s':''}</span>
      </div>

      {!loaded&&<div style={{padding:20,textAlign:'center',color:'var(--muted)',fontSize:13}}>Chargement...</div>}

      {/* Existing accounts */}
      {accounts.length===0&&loaded&&(
        <div style={{padding:16,textAlign:'center',background:'#f9f9f6',borderRadius:10,marginBottom:12}}>
          <div style={{fontSize:13,color:'var(--muted)'}}>Aucun compte pour le moment</div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Cree un compte ci-dessous pour que la closeuse puisse se connecter</div>
        </div>
      )}

      {accounts.map(a=>(
        <div key={a.code} style={{padding:'10px 0',borderBottom:'1px solid #f5f5f0'}}>
          {editing===a.code?(
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              <div style={{fontSize:11,color:'var(--muted)'}}>Code (non modifiable)</div>
              <input className="input" value={a.code} disabled style={{fontSize:13,background:'#f5f5f0',fontWeight:700}}/>
              <input className="input" placeholder="Nom de la closeuse" defaultValue={a.name} id={'edit-name-'+a.code} style={{fontSize:13}}/>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>{
                  const name=document.getElementById('edit-name-'+a.code).value.trim();
                  updateAccount(a.code,{name:name||a.name,space:name||a.name});
                }} style={{flex:1,padding:10,borderRadius:10,background:'var(--dark)',color:'#fff',fontWeight:600,fontSize:13}}>Sauver</button>
                <button onClick={()=>setEditing(null)} style={{padding:10,borderRadius:10,background:'#f0f0f0',fontSize:13}}>Annuler</button>
              </div>
            </div>
          ):(
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:36,height:36,borderRadius:10,background:'var(--dark)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <span style={{color:'#fff',fontSize:13,fontWeight:700}}>{(a.name||a.code).charAt(0)}</span>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700}}>{a.name}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>Code de connexion: <b>{a.code}</b></div>
              </div>
              <button onClick={()=>setEditing(a.code)} style={{padding:'6px 10px',borderRadius:8,background:'#f0f0f0',fontSize:11,fontWeight:600}}>Modifier</button>
              <button onClick={()=>deleteAccount(a.code)} style={{width:28,height:28,borderRadius:8,background:'var(--red-bg)',color:'var(--red-vivid)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,flexShrink:0}}>×</button>
            </div>
          )}
        </div>
      ))}

      {/* Add new account */}
      <div style={{marginTop:12,padding:12,background:'#f9f9f6',borderRadius:12}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>Nouveau compte</div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <input className="input" placeholder="Nom de la closeuse (ex: Brice Cameroun)" value={newName} onChange={e=>setNewName(e.target.value)} style={{fontSize:14,fontWeight:600}}/>
          <input className="input" placeholder="Code de connexion (ex: CM01)" value={newCode} onChange={e=>setNewCode(e.target.value.toUpperCase())} style={{fontSize:13,letterSpacing:2}}/>
          <button onClick={addAccount} style={{padding:12,borderRadius:10,background:'var(--dark)',color:'#fff',fontWeight:700,fontSize:14}}>Ajouter le compte</button>
        </div>
      </div>

      <p style={{fontSize:10,color:'var(--muted)',marginTop:10,lineHeight:1.5}}>Le MANAGER se connecte toujours avec "MANAGER". Les comptes sont synchronises sur tous les appareils.</p>
    </div>
  );
}

          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontSize:15,fontWeight:700}}>Produits & Stock</div>
            <button onClick={()=>setShowAddProd(!showAddProd)} style={{padding:'6px 12px',borderRadius:10,background:'var(--dark)',color:'#fff',fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
              <div style={{width:14,height:14}}>{showAddProd?<I.x/>:<I.plus/>}</div>{showAddProd?'Fermer':'Produit'}
            </button>
          </div>

          {showAddProd&&(
            <div style={{background:'#F9F9F6',borderRadius:12,padding:12,marginBottom:12}}>
              <input className="input" placeholder="Nom interne (ex: Gel XXL)" value={newProd.name} onChange={e=>setNewProd({...newProd,name:e.target.value})} style={{marginBottom:6}}/>
              <div style={{display:'flex',gap:6,marginBottom:6}}>
                <input className="input" type="number" placeholder="Prix" value={newProd.price} onChange={e=>setNewProd({...newProd,price:e.target.value})} style={{flex:1}}/>
                <input className="input" type="number" placeholder="Stock" value={newProd.stock} onChange={e=>setNewProd({...newProd,stock:e.target.value})} style={{flex:1}}/>
              </div>

              <button onClick={()=>{
                if(!newProd.name||!newProd.price){alert('Nom et prix requis');return}
                const prod={id:'p'+gid(),name:newProd.name,price:Number(newProd.price),stock:Number(newProd.stock)||0};
                upd('products',[...config.products,prod]);
                setNewProd({name:'',price:'',stock:''});
                setShowAddProd(false);
              }} style={{width:'100%',padding:10,borderRadius:10,background:'var(--green-vivid)',color:'#fff',fontWeight:700,fontSize:13}}>Ajouter le produit</button>
            </div>
          )}

          {config.products.map((p,i)=>{
            // Calculate used stock from orders (all non-cancelled orders consume stock)
            const cancelledStatuses=[S.ANNULE,S.ECHEC,S.ABANDONNE];
            const used=orders.filter(o=>{
              const match=o.productId===p.id||norm(o.productName||'')===norm(p.name);
              return match&&!cancelledStatuses.includes(o.status);
            }).reduce((s,o)=>s+(o.quantity||1),0);
            const remaining=Math.max(0,(p.stock||0)-used);
            const lowStock=remaining<=5&&remaining>0;
            const noStock=remaining===0&&(p.stock||0)>0;
            return(
            <div key={p.id||i} style={{padding:'12px 0',borderBottom:i<config.products.length-1?'1px solid #f0f0ec':'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <div>
                  <div style={{fontSize:14,fontWeight:700}}>{p.name}</div>
                  <div style={{fontSize:12,color:'var(--muted)'}}>{(p.price||0).toLocaleString()} F</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{textAlign:'right'}}>
                    <span style={{fontSize:11,color:'var(--muted)'}}>Stock initial</span>
                    <input type="number" min="0" value={p.stock} onChange={e=>{const prods=[...config.products];prods[i]={...prods[i],stock:Number(e.target.value)||0};upd('products',prods)}}
                      style={{width:60,padding:'4px 6px',borderRadius:8,border:'1.5px solid var(--border)',fontSize:14,fontWeight:700,textAlign:'center',fontFamily:'inherit',outline:'none',display:'block',marginTop:2}}/>
                  </div>
                  <div style={{textAlign:'center',minWidth:50}}>
                    <span style={{fontSize:11,color:'var(--muted)'}}>Restant</span>
                    <div style={{fontSize:20,fontWeight:800,color:noStock?'var(--red-vivid)':lowStock?'var(--amber-vivid)':'var(--green-vivid)',marginTop:2}}>
                      {remaining}
                    </div>
                  </div>
                  <button onClick={()=>{if(confirm('Supprimer '+p.name+' ?'))upd('products',config.products.filter((_,j)=>j!==i))}} style={{width:28,height:28,borderRadius:8,background:'var(--red-bg)',color:'var(--red-vivid)',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>
                    <div style={{width:14,height:14}}><I.x/></div>
                  </button>
                </div>
              </div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>{used} vendu{used>1?'s':''} — {remaining} restant{remaining>1?'s':''}</div>


            </div>
          )})}
        </div>
      )}

      {/* ======= CLOSEUSE + MANAGER: Zones de livraison ======= */}
      <div style={{margin:'8px 12px',background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>Zones de livraison</div>
        {config.zones.map((z,i)=>(
          <div key={i} style={{padding:'10px 0',borderBottom:'1px solid #f5f5f0'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:13,fontWeight:600}}>{z.name}</div>
                {z.desc&&<div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{z.desc}</div>}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:14,fontWeight:700}}>{(z.price||0).toLocaleString()} F</span>
                <button onClick={()=>upd('zones',config.zones.filter((_,j)=>j!==i))} style={{width:24,height:24,borderRadius:6,background:'var(--red-bg)',color:'var(--red-vivid)',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>
                  <div style={{width:12,height:12}}><I.x/></div>
                </button>
              </div>
            </div>
          </div>
        ))}
        <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:10}}>
          <input className="input" placeholder="Nom de la zone" value={newZone} onChange={e=>setNewZone(e.target.value)}/>
          <input className="input" placeholder="Description (optionnel)" value={newZoneDesc} onChange={e=>setNewZoneDesc(e.target.value)} style={{fontSize:12}}/>
          <div style={{display:'flex',gap:6}}>
            <input className="input" type="number" placeholder="Prix (F)" value={newZonePrice} onChange={e=>setNewZonePrice(e.target.value)} style={{flex:1}}/>
            <button onClick={()=>{
              if(newZone&&newZonePrice){upd('zones',[...config.zones,{name:newZone,desc:newZoneDesc.trim(),price:Number(newZonePrice)}]);setNewZone('');setNewZoneDesc('');setNewZonePrice('')}
            }} style={{padding:'0 16px',borderRadius:10,background:'var(--dark)',color:'#fff',fontWeight:700}}>
              <div style={{width:16,height:16}}><I.plus/></div>
            </button>
          </div>
        </div>
      </div>

      {/* ======= MANAGER: Couleurs des statuts ======= */}
      {isManager&&(
        <div style={{margin:'8px 12px',background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>Couleurs des statuts</div>
          {Object.values(S).map(status=>{
            const colors=(config.statusColors)||DEFAULT_STATUS_COLORS;
            const currentColor=colors[status]||'#6B7280';
            return(
              <div key={status} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0',borderBottom:'1px solid #f5f5f0'}}>
                <input type="color" value={currentColor} onChange={e=>{
                  const newColors={...colors,[status]:e.target.value};
                  upd('statusColors',newColors);
                }} style={{width:32,height:32,border:'none',borderRadius:8,cursor:'pointer',padding:0}}/>
                <div style={{flex:1}}>
                  <span style={{fontSize:13,fontWeight:600}}>{status}</span>
                </div>
                <div style={{height:4,width:60,borderRadius:2,background:currentColor}}/>
              </div>
            );
          })}
        </div>
      )}

      {/* ======= CLOSEUSE + MANAGER: Paramètres de rappel ======= */}
      <div style={{margin:'8px 12px',background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
        <div style={{fontSize:15,fontWeight:700,marginBottom:12}}>Paramètres de rappel</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div>
            <label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>Timer injoignable (h)</label>
            <input className="input" type="number" step="0.5" value={config.timerInjo||2} onChange={e=>upd('timerInjo',Number(e.target.value))} style={{marginTop:4}}/>
          </div>
          <div>
            <label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>Timer rappelé (h)</label>
            <input className="input" type="number" step="0.5" value={config.timerRappel||1} onChange={e=>upd('timerRappel',Number(e.target.value))} style={{marginTop:4}}/>
          </div>
        </div>
        <div style={{marginTop:10}}>
          <label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>Tentatives max avant abandon</label>
          <input className="input" type="number" min="1" max="10" value={config.maxAttempts} onChange={e=>upd('maxAttempts',Number(e.target.value))} style={{marginTop:4}}/>
        </div>
      </div>

      {/* ======= CLOSEUSE + MANAGER: Messages WhatsApp ======= */}
      <div style={{margin:'8px 12px',background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div>
            <div style={{fontSize:15,fontWeight:700}}>Messages WhatsApp</div>
            <div style={{fontSize:11,color:'var(--muted)'}}>Variables : {'{nom}'} {'{produit}'} {'{prix}'} {'{ville}'} {'{numero_commande}'}</div>
          </div>
          <button onClick={()=>setShowAddTpl(!showAddTpl)} style={{padding:'6px 12px',borderRadius:10,background:'var(--dark)',color:'#fff',fontSize:12,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
            <div style={{width:14,height:14}}>{showAddTpl?<I.x/>:<I.plus/>}</div>{showAddTpl?'Fermer':'Message'}
          </button>
        </div>

        {showAddTpl&&(
          <div style={{background:'#F0FDF4',borderRadius:12,padding:12,marginBottom:12,border:'1px solid #BBF7D0'}}>
            <input className="input" placeholder="Nom du message (ex: Relance)" value={newTpl.name} onChange={e=>setNewTpl({...newTpl,name:e.target.value})} style={{marginBottom:6}}/>
            <select className="select" value={newTpl.situation} onChange={e=>setNewTpl({...newTpl,situation:e.target.value})} style={{marginBottom:6}}>
              <option value="injoignable">Injoignable</option>
              <option value="confirmation">Confirmation</option>
              <option value="rappel_client">Client rappellera</option>
              <option value="relance">Relance</option>
              <option value="suivi">Suivi livraison</option>
              <option value="custom">Autre</option>
            </select>
            <textarea className="input" rows={3} placeholder="Bonjour {nom}, votre commande {produit}..." value={newTpl.text} onChange={e=>setNewTpl({...newTpl,text:e.target.value})} style={{fontSize:12,marginBottom:8}}/>
            <button onClick={()=>{
              if(!newTpl.name||!newTpl.text){alert('Nom et message requis');return}
              upd('waTemplates',[...(config.waTemplates||[]),{id:'t'+gid(),name:newTpl.name,situation:newTpl.situation,text:newTpl.text}]);
              setNewTpl({name:'',situation:'custom',text:''});setShowAddTpl(false);
            }} style={{width:'100%',padding:10,borderRadius:10,background:'#25D366',color:'#fff',fontWeight:700,fontSize:13}}>Ajouter le message</button>
          </div>
        )}

        {(config.waTemplates||[]).map((t,i)=>(
          <div key={t.id} style={{padding:'10px 0',borderBottom:i<(config.waTemplates||[]).length-1?'1px solid #f5f5f0':'none'}}>
            {editTpl===t.id?(
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                <input className="input" value={t.name} onChange={e=>{const tpls=[...(config.waTemplates||[])];tpls[i]={...tpls[i],name:e.target.value};upd('waTemplates',tpls)}} style={{fontSize:13}}/>
                <textarea className="input" rows={3} value={t.text} onChange={e=>{const tpls=[...(config.waTemplates||[])];tpls[i]={...tpls[i],text:e.target.value};upd('waTemplates',tpls)}} style={{fontSize:12}}/>
                <button onClick={()=>setEditTpl(null)} style={{padding:'8px 0',borderRadius:8,background:'var(--dark)',color:'#fff',fontWeight:600,fontSize:12}}>Fermer</button>
              </div>
            ):(
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:14,fontWeight:700}}>{t.name}</span>
                    <span style={{padding:'2px 6px',borderRadius:6,background:'var(--green-bg)',color:'var(--green-text)',fontSize:9,fontWeight:600}}>{t.situation}</span>
                  </div>
                  <div style={{display:'flex',gap:4}}>
                    <button onClick={()=>setEditTpl(t.id)} style={{width:28,height:28,borderRadius:8,background:'var(--blue-bg)',color:'var(--blue-vivid)',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>
                      <div style={{width:13,height:13}}><I.edit/></div>
                    </button>
                    <button onClick={()=>{if(confirm(`Supprimer "${t.name}" ?`))upd('waTemplates',(config.waTemplates||[]).filter(x=>x.id!==t.id))}} style={{width:28,height:28,borderRadius:8,background:'var(--red-bg)',color:'var(--red-vivid)',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>
                      <div style={{width:13,height:13}}><I.x/></div>
                    </button>
                  </div>
                </div>
                <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.5}}>{t.text}</div>
              </div>
            )}
          </div>
        ))}
        {(!config.waTemplates||config.waTemplates.length===0)&&<div style={{padding:'12px 0',textAlign:'center',color:'var(--muted)',fontSize:13}}>Aucun message configuré</div>}
      </div>

      {/* ======= CLOSEUSE + MANAGER: Grille de rémunération ======= */}
      <div style={{margin:'8px 12px',background:'#fff',borderRadius:14,overflow:'hidden',boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
        <div style={{padding:'14px 14px 8px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:15,fontWeight:700}}>Grille de rémunération</div>
          {isManager&&<span style={{fontSize:10,color:'var(--muted)'}}>Modifiable</span>}
        </div>
        <div style={{padding:'0 14px 8px',fontSize:12,color:'var(--muted)'}}>
          Basée sur le taux de confirmation — minimum 80% de livraison requis
        </div>
        {(config.salaryGrid||[]).map((tier,i)=>{
          const bgs=['#F9FAFB','#FFEDD5','#CCFBF1','#FEF3C7','#EDE9FE','#FCE7F3'];
          return(
            <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:bgs[i%bgs.length],borderTop:'1px solid rgba(0,0,0,0.04)'}}>
              {isManager?(
                <>
                  <input value={tier.emoji} onChange={e=>{const g=[...config.salaryGrid];g[i]={...g[i],emoji:e.target.value};upd('salaryGrid',g)}} style={{width:32,fontSize:20,textAlign:'center',border:'none',background:'transparent',fontFamily:'inherit',padding:0}}/>
                  <div style={{flex:1}}>
                    <input value={tier.label} onChange={e=>{const g=[...config.salaryGrid];g[i]={...g[i],label:e.target.value};upd('salaryGrid',g)}} style={{fontSize:13,fontWeight:700,border:'none',background:'transparent',fontFamily:'inherit',width:'100%',padding:0}}/>
                    <div style={{display:'flex',alignItems:'center',gap:4,marginTop:2}}>
                      <span style={{fontSize:11,color:'var(--muted)'}}>≥</span>
                      <input type="number" value={tier.minConfirm} onChange={e=>{const g=[...config.salaryGrid];g[i]={...g[i],minConfirm:Number(e.target.value)};upd('salaryGrid',g)}} style={{width:40,fontSize:11,border:'none',background:'rgba(255,255,255,0.5)',borderRadius:4,padding:'2px 4px',fontFamily:'inherit',textAlign:'center'}}/>
                      <span style={{fontSize:11,color:'var(--muted)'}}>% confirm.</span>
                    </div>
                  </div>
                  <input type="number" value={tier.rate} onChange={e=>{const g=[...config.salaryGrid];g[i]={...g[i],rate:Number(e.target.value)};upd('salaryGrid',g)}} style={{width:60,fontSize:14,fontWeight:800,border:'none',background:'rgba(255,255,255,0.5)',borderRadius:6,padding:'4px 6px',fontFamily:'inherit',textAlign:'right'}}/>
                  <span style={{fontSize:11,color:'var(--muted)'}}>F</span>
                  <button onClick={()=>upd('salaryGrid',config.salaryGrid.filter((_,j)=>j!==i))} style={{width:22,height:22,borderRadius:6,background:'rgba(0,0,0,0.06)',color:'var(--muted)',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}>
                    <div style={{width:10,height:10}}><I.x/></div>
                  </button>
                </>
              ):(
                <>
                  <span style={{fontSize:22,width:32,textAlign:'center'}}>{tier.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700}}>{tier.label}</div>
                    <div style={{fontSize:11,color:'var(--muted)'}}>{tier.minConfirm===100?'=':'≥'} {tier.minConfirm}% confirmation</div>
                  </div>
                  <span style={{fontSize:16,fontWeight:800}}>{tier.rate.toLocaleString()} F</span>
                  <span style={{fontSize:11,color:'var(--muted)'}}>/livr.</span>
                </>
              )}
            </div>
          );
        })}
        {isManager&&(
          <button onClick={()=>upd('salaryGrid',[...(config.salaryGrid||[]),{minConfirm:90,rate:1800,label:'Nouveau palier',emoji:'⭐'}])} style={{width:'100%',padding:'10px 14px',background:'#f5f5f0',color:'var(--muted)',fontSize:12,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:4,borderTop:'1px solid rgba(0,0,0,0.04)'}}>
            <div style={{width:14,height:14}}><I.plus/></div> Ajouter un palier
          </button>
        )}
        <div style={{padding:'10px 14px',background:'var(--red-bg)',display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:14}}>🔒</span>
          <span style={{fontSize:12,fontWeight:600,color:'var(--red-text)'}}>Si livraison &lt; 80% → bloqué au palier le plus bas</span>
        </div>
      </div>

      {/* ======= MANAGER ONLY: Alertes WhatsApp & Notifications ======= */}
      {isManager&&(
        <div style={{margin:'8px 12px',background:'#fff',borderRadius:14,padding:14,boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>Rapport WhatsApp quotidien</div>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:12,lineHeight:1.5}}>
            Tu recevras un rapport quotidien sur WhatsApp. Envoie "I allow callmebot to send me messages" au +34 644 71 58 39 pour obtenir ton apikey.
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <div>
              <label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>Ton numéro WhatsApp (avec indicatif)</label>
              <input className="input" placeholder="+22997000000" value={config.whatsappPhone||''} onChange={e=>upd('whatsappPhone',e.target.value)} style={{marginTop:4}}/>
            </div>
            <div>
              <label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>API Key CallMeBot</label>
              <input className="input" placeholder="123456" value={config.whatsappApiKey||''} onChange={e=>upd('whatsappApiKey',e.target.value)} style={{marginTop:4}}/>
            </div>
            <div>
              <label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>Heure du point quotidien</label>
              <select className="select" value={config.dailyReportHour||20} onChange={e=>upd('dailyReportHour',Number(e.target.value))} style={{marginTop:4}}>
                {[17,18,19,20,21,22].map(h=><option key={h} value={h}>{h}h00</option>)}
              </select>
            </div>
            {config.whatsappPhone&&config.whatsappApiKey&&(
              <button onClick={()=>{sendWhatsApp(config.whatsappPhone,config.whatsappApiKey,'✅ Test ClosePro — Les alertes WhatsApp fonctionnent !');alert('Message envoyé — vérifie ton WhatsApp')}} style={{padding:12,borderRadius:12,background:'#25D366',color:'#fff',fontWeight:700,fontSize:14}}>
                Envoyer un message test
              </button>
            )}
            <div style={{marginTop:4,fontSize:11,color:'var(--muted)'}}>
              Format numéro : +22997123456 (avec indicatif, sans espaces)
            </div>
          </div>
          <div style={{marginTop:12,padding:10,borderRadius:10,background:'#F9F9F6',fontSize:12,color:'var(--muted)',lineHeight:1.6}}>
            Tu recevras un résumé complet chaque jour à {config.dailyReportHour||20}h : commandes, taux, CA, et montant à verser.
          </div>
        </div>
      )}

      {/* ======= MANAGER ONLY: Comptes ======= */}
      {isManager&&(
        <AccountsManager/>
      )}

      {/* ======= MANAGER ONLY: Données ======= */}
      {isManager&&(
        <div style={{margin:'8px 12px 20px',display:'flex',flexDirection:'column',gap:8}}>
          <button onClick={()=>{if(db)db.collection('global').doc('loginBlock').set({unblocked:Date.now()}).catch(()=>{});alert('Connexions débloquées')}} style={{width:'100%',padding:14,background:'var(--amber-bg)',color:'var(--amber-text)',borderRadius:14,fontWeight:700,fontSize:14,border:'1.5px solid #FDE68A'}}>
            Débloquer les connexions
          </button>
          <button onClick={()=>{if(confirm('Supprimer les '+orders.length+' commandes ? Les statuts et commentaires seront perdus.')){clearAllOrders();alert('Commandes supprimées')}}} style={{width:'100%',padding:14,background:'#fff',color:'var(--red-vivid)',borderRadius:14,fontWeight:700,fontSize:14,border:'1.5px solid #FECACA'}}>
            Supprimer toutes les commandes ({orders.length})
          </button>
          <button onClick={()=>{if(confirm('Supprimer TOUTES les données Firebase ? Irreversible.')){if(db){ordersRef(spaceCode).get().then(s=>s.forEach(d=>d.ref.delete()));msgsRef(spaceCode).get().then(s=>s.forEach(d=>d.ref.delete()));expRef(spaceCode).get().then(s=>s.forEach(d=>d.ref.delete()));spaceRef(spaceCode).delete()}window.location.reload()}}} style={{width:'100%',padding:14,background:'var(--red-bg)',color:'var(--red-vivid)',borderRadius:14,fontWeight:700,fontSize:14,border:'1.5px solid #FECACA'}}>
            Réinitialiser toutes les données
          </button>
        </div>
      )}

      {!isManager&&<div style={{height:20}}/>}
      {syncSheet&&<SheetSync sheetUrl={syncSheet.url} sheetLabel={syncSheet.label} onClose={()=>setSyncSheet(null)}/>}
    </div>
  );
}

// ============== NOTIFICATION POPUP (Closeuse) ==============
function NotificationPopup({isMgr}){
  const {messages,seenMsg,config}=useContext(Ctx);
  const [activeMsg,setActiveMsg]=useState(null);
  const otherRole=isMgr?'closeuse':'manager';
  const unread=messages.filter(m=>m.from===otherRole&&!m.seen);
  const prevCountRef=useRef(0);
  const timerRef=useRef(null);

  // Parse JSON message to extract plain text
  const getPlainText=(m)=>{
    try{const p=JSON.parse(m.text);return p.text||m.text}catch(e){return m.text}
  };

  useEffect(()=>{
    if(unread.length>0&&!activeMsg){
      const msg=unread[unread.length-1];
      setActiveMsg(msg);
      if(unread.length>prevCountRef.current){
        // Silent notification
      }
      // Auto-dismiss after 3 seconds
      if(timerRef.current)clearTimeout(timerRef.current);
      timerRef.current=setTimeout(()=>{seenMsg(msg.id);setActiveMsg(null)},3000);
    }
    prevCountRef.current=unread.length;
    return()=>{if(timerRef.current)clearTimeout(timerRef.current)};
  },[unread.length]);

  if(!activeMsg)return null;
  const senderName=isMgr?(config.closeuseName||'Closeuse'):'Manager';

  return(
    <div style={{position:'fixed',top:8,left:8,right:8,zIndex:200,pointerEvents:'none'}}>
      <div onClick={()=>{seenMsg(activeMsg.id);setActiveMsg(null)}} style={{background:'#fff',borderRadius:14,padding:'12px 14px',boxShadow:'0 4px 20px rgba(0,0,0,0.15)',pointerEvents:'auto',animation:'slideDown .25s ease-out',display:'flex',alignItems:'center',gap:10}}>
        <style>{`@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}`}</style>
        <div style={{width:36,height:36,borderRadius:18,background:isMgr?'#22C55E':'#111',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <span style={{fontSize:14,fontWeight:700,color:'#fff'}}>{isMgr?'C':'M'}</span>
        </div>
        <div style={{flex:1,overflow:'hidden'}}>
          <div style={{fontSize:13,fontWeight:700,color:'#111'}}>{senderName}</div>
          <div style={{fontSize:13,color:'#555',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{getPlainText(activeMsg)}</div>
        </div>
        <span style={{fontSize:10,color:'#aaa',flexShrink:0}}>{fmtTime(activeMsg.ts)}</span>
      </div>
    </div>
  );
}

// ============== MESSAGE PANEL (Manager) ==============
function ChatPage({isMgr}){
  const {messages,sendMsg,seenMsg,deleteMsg,pinMsg,config,spacesStatus,spaceCode}=useContext(Ctx);
  const [text,setText]=useState('');
  const [replyTo,setReplyTo]=useState(null);
  const [menuMsg,setMenuMsg]=useState(null);
  const [showPinned,setShowPinned]=useState(false);
  const sorted=[...messages].sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const pinned=messages.filter(m=>m.pinned);
  const bottomRef=useRef(null);
  const longPressRef=useRef(null);
  const inputRef=useRef(null);
  const myRole=isMgr?'manager':'closeuse';
  const otherRole=isMgr?'closeuse':'manager';
  const otherName=isMgr?(config.closeuseName||'Closeuse'):'Manager';

  useEffect(()=>{messages.filter(m=>m.from===otherRole&&!m.seen).forEach(m=>seenMsg(m.id))},[messages]);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'})},[sorted.length]);

  const doSend=()=>{
    if(!text.trim())return;
    sendMsg(JSON.stringify({text:text,replyId:replyTo?.id||null,replyText:replyTo?.rawText||null,replyFrom:replyTo?.from||null}),myRole);
    setText('');setReplyTo(null);
  };
  const parseMsg=(m)=>{try{const p=JSON.parse(m.text);return{text:p.text||m.text,replyId:p.replyId,replyText:p.replyText,replyFrom:p.replyFrom}}catch(e){return{text:m.text,replyId:null,replyText:null,replyFrom:null}}};
  const startPress=(m)=>{longPressRef.current=setTimeout(()=>{setMenuMsg(m);},400)};
  const endPress=()=>{if(longPressRef.current)clearTimeout(longPressRef.current)};
  const isOnline=()=>{if(!isMgr)return true;const st=spacesStatus[spaceCode];return st?(Date.now()-st.lastSeen)<60000:false};

  return(
    <div className="page" style={{display:'flex',flexDirection:'column',background:'#0b141a'}}>
      {/* Header */}
      <div style={{position:'sticky',top:0,zIndex:40,background:'#1f2c34',padding:'6px 10px',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:40,height:40,borderRadius:20,background:'#2a3942',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg viewBox="0 0 24 24" fill="#8696a0" style={{width:26,height:26}}><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:16,fontWeight:500,color:'#e9edef'}}>{otherName}</div>
          <div style={{fontSize:13,color:isOnline()?'#00a884':'#8696a0'}}>{isOnline()?'en ligne':'hors ligne'}</div>
        </div>
      </div>

      {/* Pinned */}
      {pinned.length>0&&(
        <div onClick={()=>setShowPinned(!showPinned)} style={{background:'#1f2c34',padding:'8px 14px',borderBottom:'1px solid #222d35',display:'flex',alignItems:'center',gap:8}}>
          <svg viewBox="0 0 24 24" fill="#00a884" style={{width:14,height:14,transform:'rotate(45deg)'}}><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
          <div style={{flex:1,fontSize:13,color:'#e9edef',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{parseMsg(pinned[pinned.length-1]).text}</div>
          <span style={{fontSize:11,color:'#8696a0'}}>{pinned.length>1?pinned.length:''}</span>
        </div>
      )}
      {showPinned&&pinned.length>0&&(
        <div style={{background:'#111b21',padding:'4px 14px 8px',borderBottom:'1px solid #222d35',maxHeight:180,overflowY:'auto'}}>
          {pinned.map(m=>(
            <div key={m.id} style={{padding:'8px 0',borderBottom:'1px solid #222d35',display:'flex',gap:8,alignItems:'center'}}>
              <div style={{flex:1,fontSize:13,color:'#d1d7db',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{parseMsg(m).text}</div>
              <button onClick={e=>{e.stopPropagation();pinMsg(m.id)}} style={{fontSize:10,color:'#8696a0',padding:'3px 8px',borderRadius:4,background:'#2a3942'}}>Retirer</button>
            </div>
          ))}
        </div>
      )}

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'4px 10px',background:'#0b141a url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkCAYAAABw4pVUAAAACXBIWXMAAAsTAAALEwEAmpwYAAABhUlEQVR4nO3cMQ6DMBQF0fb+l0yXLB0YiN+DL+eMlgj5S7YBAAAAAAAAAAAAAAAAAAAAYOXx+/v3eo19j4+/z6/v3r9Wz/f5+0fPv9X31c8BXz/3+vvsfv7e9de97tH1euv1Vj9f/ftr7+/+e1k977f7/Pb9nG/31d+jx+rrds+r1+3u59X3s7ufveu/u7+rn1+9r7P7ee/7q+uu+3rfAQAAAAAAAAAAAAAAAAAAADjR4/cHAAAAAAAAAAAAAAAAAAAAWN/j9wcAAAAAAAAAAAAAAAAAAABY3+P3BwAAAAAAAAAAAAAAAAAAAFjf4/cHAAAAAAAAAAAAAAAAAAAAWN/j9wcAAAAAAAAAAAAAAAAAAABY3+P3BwAAAAAAAAAAAPgvTwBQSwMEFAAGAA==") repeat'}}>
        {sorted.length===0&&(
          <div style={{textAlign:'center',padding:'48px 20px'}}>
            <div style={{background:'#1d2831',borderRadius:8,padding:'10px 18px',display:'inline-block',fontSize:13,color:'#8696a0',lineHeight:1.5}}>Les messages sont protégés.</div>
          </div>
        )}
        {sorted.map((m,i)=>{
          const isMe=m.from===myRole;
          const parsed=parseMsg(m);
          const prevMsg=i>0?sorted[i-1]:null;
          const showDate=!prevMsg||new Date(m.ts).toDateString()!==new Date(prevMsg.ts).toDateString();
          const sameSender=prevMsg&&prevMsg.from===m.from&&!showDate;
          const isLast=!sorted[i+1]||sorted[i+1].from!==m.from;

          return(
            <React.Fragment key={m.id}>
              {showDate&&(
                <div style={{textAlign:'center',padding:'8px 0',margin:'4px 0'}}>
                  <span style={{fontSize:12,color:'#8696a0',background:'#1f2c34',padding:'5px 14px',borderRadius:8}}>
                    {new Date(m.ts).toDateString()===new Date().toDateString()?"AUJOURD\u0027HUI":new Date(m.ts).toLocaleDateString('fr',{day:'numeric',month:'long',year:'numeric'}).toUpperCase()}
                  </span>
                </div>
              )}
              <div style={{display:'flex',justifyContent:isMe?'flex-end':'flex-start',marginTop:sameSender?1:6,marginBottom:isLast?4:0,paddingLeft:isMe?48:0,paddingRight:isMe?0:48}}
                onTouchStart={()=>startPress(m)} onTouchEnd={endPress} onTouchCancel={endPress}
                onContextMenu={e=>{e.preventDefault();setMenuMsg(m)}}>
                <div style={{position:'relative',maxWidth:'100%'}}>
                  {!sameSender&&<div style={{position:'absolute',top:0,[isMe?'right':'left']:-8,width:0,height:0,borderTop:isMe?'8px solid #005c4b':'8px solid #1f2c34',[isMe?'borderLeft':'borderRight']:'8px solid transparent'}}/>}
                  <div style={{padding:parsed.replyText?'3px 7px 5px':'5px 7px 5px',borderRadius:sameSender?8:isMe?'8px 0 8px 8px':'0 8px 8px 8px',background:isMe?'#005c4b':'#1f2c34',minWidth:85}}>
                    {m.pinned&&(
                      <div style={{display:'flex',alignItems:'center',gap:3,marginBottom:2}}>
                        <svg viewBox="0 0 24 24" fill="#8696a0" style={{width:10,height:10,transform:'rotate(45deg)'}}><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
                        <span style={{fontSize:10,color:'#8696a0'}}>Épinglé</span>
                      </div>
                    )}
                    {parsed.replyText&&(
                      <div style={{padding:'5px 10px',margin:'2px 0 4px',borderRadius:7,background:'rgba(0,0,0,0.2)',borderLeft:`4px solid ${parsed.replyFrom===myRole?'#53bdeb':'#00a884'}`}}>

                      </div>
                    )}
                    <div style={{padding:'0 4px'}}>
                      <span style={{fontSize:14.2,lineHeight:'19px',color:'#e9edef',wordWrap:'break-word',whiteSpace:'pre-wrap'}}>{parsed.text}</span>
                      <span style={{float:'right',marginLeft:12,marginTop:3,display:'inline-flex',alignItems:'center',gap:3}}>
                        <span style={{fontSize:11,color:'rgba(255,255,255,0.45)'}}>{new Date(m.ts).toLocaleTimeString('fr',{hour:'2-digit',minute:'2-digit'})}</span>
                        {isMe&&(
                          <svg viewBox="0 0 16 11" style={{width:16,height:11}}>
                            <path d="M11.071.653a.457.457 0 0 0-.304-.102.493.493 0 0 0-.381.178l-6.19 7.636-2.011-2.095a.463.463 0 0 0-.336-.153.457.457 0 0 0-.339.142.477.477 0 0 0 .004.67l2.357 2.46a.465.465 0 0 0 .336.152.457.457 0 0 0 .347-.164l6.46-7.965a.477.477 0 0 0 .057-.588z" fill={m.seen?'#53bdeb':'rgba(255,255,255,0.4)'}/>
                            {m.seen&&<path d="M7.511 8.452l.553-.68 5.947-7.322a.457.457 0 0 0-.304-.102.493.493 0 0 0-.381.178l-6.19 7.636" fill="#53bdeb"/>}
                          </svg>
                        )}
                      </span>
                    </div>
                    <div style={{clear:'both'}}/>
                  </div>
                </div>
              </div>
            </React.Fragment>
          );
        })}
        <div ref={bottomRef}/>
      </div>

      {/* Menu */}
      {menuMsg&&(
        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:100,background:'rgba(0,0,0,0.5)'}} onClick={()=>setMenuMsg(null)}>
          <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'#233138',borderRadius:12,minWidth:220,overflow:'hidden'}} onClick={e=>e.stopPropagation()}>

              {label:'Copier',action:()=>{navigator.clipboard?.writeText(parseMsg(menuMsg).text);setMenuMsg(null)}},
              {label:menuMsg.pinned?'Désépingler':'Épingler',action:()=>{pinMsg(menuMsg.id);setMenuMsg(null)}},
              ...(menuMsg.from===myRole?[{label:'Supprimer',action:()=>{deleteMsg(menuMsg.id);setMenuMsg(null)},danger:true}]:[]),

              <button key={idx} onClick={item.action} style={{width:'100%',padding:'14px 20px',textAlign:'left',fontSize:16,color:item.danger?'#ef4444':'#e9edef',borderBottom:'1px solid #1a262d',background:'transparent'}}>{item.label}</button>

      {/* Reply */}
      {replyTo&&(
        <div style={{padding:'6px 8px',background:'#1f2c34',display:'flex',alignItems:'stretch',gap:8}}>
          <div style={{flex:1,padding:'6px 12px',borderRadius:8,background:'#111b21',borderLeft:`4px solid ${replyTo.from===myRole?'#53bdeb':'#00a884'}`,overflow:'hidden'}}>

            <div style={{fontSize:13,color:'#8696a0',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',marginTop:1}}>{replyTo.rawText}</div>
          </div>
          <button onClick={()=>setReplyTo(null)} style={{width:28,display:'flex',alignItems:'center',justifyContent:'center',color:'#8696a0'}}>
            <div style={{width:16,height:16}}><I.x/></div>
          </button>
        </div>
      )}

      {/* Input */}
      <div style={{padding:'4px 8px 6px',background:'#1f2c34',display:'flex',gap:6,alignItems:'flex-end'}}>
        <div style={{flex:1,display:'flex',alignItems:'flex-end',background:'#2a3942',borderRadius:24,padding:'2px 12px'}}>
          <input ref={inputRef} placeholder="Message" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doSend()}}
            style={{flex:1,border:'none',outline:'none',fontSize:16,padding:'10px 0',fontFamily:'inherit',background:'transparent',color:'#e9edef'}}/>
        </div>
        <button onClick={doSend} style={{width:48,height:48,borderRadius:24,background:'#00a884',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <svg viewBox="0 0 24 24" fill="#111b21" style={{width:24,height:24}}><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  );
}

// ============== LOGIN ==============
function Login({onLogin}){
  const [code,setCode]=useState('');
  const [error,setError]=useState('');
  const [accounts,setAccounts]=useState(null); // null=loading
  const [blocked,setBlocked]=useState(false);
  const [blockTimer,setBlockTimer]=useState(0);

  // Load accounts from Firebase on mount
  useEffect(()=>{
    if(!db){
      // No Firebase — fallback to localStorage
      setAccounts([]);
      return;
    }
    const unsub=db.collection('global').doc('accounts').onSnapshot(snap=>{
      if(snap.exists&&snap.data().list){
        const list=snap.data().list;

        setAccounts(list);
      }else{
        // No accounts in Firebase — check localStorage
        setAccounts([]);
      }
    },()=>{
      // Offline — use localStorage
      setAccounts([]);
    });
    return()=>unsub();
  },[]);

  // Block check
  useEffect(()=>{
    const check=()=>{
      const unblockTs=0; // TODO: Firebase-based unblock
      const recent=[];
      if(unblockTs&&recent.length>0&&unblockTs>Math.max(...recent.map(a=>a.ts))){setBlocked(false);setBlockTimer(0);return}
      if(recent.length>=5){
        setBlocked(true);
        const oldest=Math.min(...recent.map(a=>a.ts));
        const remaining=Math.ceil((600000-(Date.now()-oldest))/1000);
        setBlockTimer(Math.max(0,remaining));
        if(remaining<=0){setBlocked(false);setBlockTimer(0)}
      }else{setBlocked(false);setBlockTimer(0)}
    };
    check();const t=setInterval(check,1000);return()=>clearInterval(t);
  },[]);

  const tryLogin=(inputCode)=>{
    if(!inputCode||inputCode.length<2){setError('Entre un code (minimum 2 caracteres)');return}
    if(inputCode==='MANAGER'){onLogin(inputCode);return}
    if(blocked){setError('Bloque — reessaye dans '+Math.ceil(blockTimer/60)+' min');return}
    if(accounts===null){setError('Chargement des comptes...');return}

    // Find account matching the code
    const account=accounts.find(a=>a.code===inputCode);
    if(account){
      onLogin(account.space);
    }else{
      const recentFails=[];
      if(recentFails.length>=5){
        setBlocked(true);
        setError('Trop de tentatives — bloque 10 minutes.');
      }else{
        setError('Code incorrect. '+(5-recentFails.length)+' essai'+(5-recentFails.length>1?'s':'')+' restant'+(5-recentFails.length>1?'s':'')+'.');
      }
    }
  };

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:24,background:'#111'}}>
      <div style={{width:72,height:72,borderRadius:18,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20}}>
        <span style={{fontSize:28,fontWeight:800,letterSpacing:-1}}>C<span style={{color:'#16A34A'}}>P</span></span>
      </div>
      <h1 style={{color:'#fff',fontSize:26,fontWeight:700,letterSpacing:-0.5,marginBottom:4}}>ClosePro</h1>
      <p style={{color:'#666',fontSize:13,marginBottom:28}}>Gestion des commandes</p>
      {accounts===null&&<p style={{color:'#555',fontSize:12,marginBottom:10}}>Chargement des comptes...</p>}
      <input className="input" placeholder="Code de connexion" value={code} onChange={e=>{setCode(e.target.value.toUpperCase());setError('')}}
        style={{maxWidth:260,textAlign:'center',fontSize:20,letterSpacing:6,fontWeight:700,padding:14,borderColor:error?'#EF4444':'var(--border)'}}
        onKeyDown={e=>{if(e.key==='Enter')tryLogin(code)}}/>
      {error&&<div style={{marginTop:10,padding:'8px 16px',borderRadius:10,background:'rgba(239,68,68,0.15)',color:'#FCA5A5',fontSize:13,fontWeight:500,maxWidth:280,textAlign:'center'}}>{error}</div>}
      {blocked&&blockTimer>0&&<div style={{marginTop:6,fontSize:12,color:'#666'}}>Deblocage dans {Math.floor(blockTimer/60)}:{String(blockTimer%60).padStart(2,'0')}</div>}
      <button onClick={()=>tryLogin(code)} style={{marginTop:14,width:260,padding:14,background:blocked?'#333':'#fff',color:blocked?'#666':'#111',borderRadius:14,fontWeight:700,fontSize:15,opacity:blocked?0.6:1}}>
        {blocked?'Bloque':'Connexion'}
      </button>
      {accounts&&accounts.length===0&&<p style={{color:'#555',fontSize:11,marginTop:16}}>Aucun compte. Connecte-toi en MANAGER pour creer des comptes.</p>}
    </div>
  );
}


// ============== SETUP SCREEN (first launch) ==============
function SetupScreen({onCreated,onLogout}){
  const [accounts,setAccounts]=useState([]);
  const [code,setCode]=useState('');
  const [name,setName]=useState('');
  const [loading,setLoading]=useState(true);


  useEffect(()=>{
    if(!db){setLoading(false);return}
    const unsub=db.collection('global').doc('accounts').onSnapshot(snap=>{
      if(snap.exists&&snap.data().list&&snap.data().list.length>0){
        const accs=snap.data().list;
        setAccounts(accs);
        onCreated(accs[0].space);
      }
      setLoading(false);
    },()=>setLoading(false));
    return()=>unsub();
  },[]);

  const create=()=>{
    const n=name.trim();
    const c=code.trim().toUpperCase();
    if(!n){alert('Nom obligatoire');return}
    if(!c){alert('Code obligatoire');return}
    if(c==='MANAGER'){alert('MANAGER est reserve');return}
    const newAcc={code:c,name:n,space:n,createdAt:new Date().toISOString()};
    const list=[...accounts,newAcc];
    if(db)db.collection('global').doc('accounts').set({list}).catch(()=>{});
    onCreated(n);
  };

  if(loading)return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',background:'#111',color:'#fff'}}>
      <div style={{fontSize:16,fontWeight:600}}>Connexion...</div>
    </div>
  );

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:24,background:'#111'}}>
      <div style={{width:72,height:72,borderRadius:18,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20}}>
        <span style={{fontSize:28,fontWeight:800,letterSpacing:-1}}>C<span style={{color:'#16A34A'}}>P</span></span>
      </div>
      <h1 style={{color:'#fff',fontSize:22,fontWeight:700,marginBottom:6}}>Bienvenue sur ClosePro</h1>
      <p style={{color:'#666',fontSize:13,marginBottom:24,textAlign:'center'}}>Aucun espace configure. Cree ton premier espace pour commencer.</p>

      <div style={{width:'100%',maxWidth:300,display:'flex',flexDirection:'column',gap:10}}>
        <input className="input" placeholder="Nom de la closeuse" value={name} onChange={e=>setName(e.target.value)} style={{fontSize:16,fontWeight:600,textAlign:'center',padding:14}}/>
        <input className="input" placeholder="Code de connexion (ex: SN01)" value={code} onChange={e=>setCode(e.target.value.toUpperCase())} style={{fontSize:14,letterSpacing:3,textAlign:'center',padding:12}}/>
        <button onClick={create} style={{padding:14,borderRadius:14,background:'#fff',color:'#111',fontWeight:700,fontSize:15}}>
          Creer l'espace
        </button>
        <button onClick={onLogout} style={{padding:10,borderRadius:10,background:'transparent',color:'#555',fontSize:12}}>
          Deconnexion
        </button>
      </div>
    </div>
  );
}

// ============== APP ==============

function App(){
  const [user,setUser]=useState(()=>gs('user',null));
  const [tab,setTab]=useState(()=>{const u=gs('user',null);return u&&u.code==='MANAGER'?'dashboard':'orders'});
  const [spaceCode,setSpaceCode]=useState(()=>{const u=gs('user',null);return u?u.code==='MANAGER'?(gs('mgrSpace',null)):u.code:null});

  // Load accounts from Firebase → set first space for manager
  useEffect(()=>{
    if(!db||!user)return;
    const unsub=db.collection('global').doc('accounts').onSnapshot(snap=>{
      if(snap.exists&&snap.data().list){
        const accs=snap.data().list;
        const spaceList=[...new Set(accs.map(a=>a.space))];
        if(!spaceCode&&user.code==='MANAGER'&&spaceList.length>0){
          setSpaceCode(spaceList[0]);
          ss('mgrSpace',spaceList[0]);
        }
      }
    });
    return()=>unsub();
  },[user,spaceCode]);

  if(!user)return <Login onLogin={(code)=>{
    const u={code};ss('user',u);setUser(u);
    if(code==='MANAGER'){setTab('dashboard');setSpaceCode(gs('mgrSpace',null))}
    else{setTab('orders');setSpaceCode(code)}
  }}/>;

  const isMgr=user.code==='MANAGER';
  const changeSpace=(code)=>{setSpaceCode(code);ss('mgrSpace',code)};

  // Manager: no space yet → create first account
  if(isMgr&&!spaceCode)return <SetupScreen onCreated={(code)=>{setSpaceCode(code);ss('mgrSpace',code)}} onLogout={()=>{localStorage.removeItem('cp_user');setUser(null)}}/>;

  return(
    <Provider key={spaceCode} spaceCode={spaceCode} isMgr={isMgr}>
      <AppInner isMgr={isMgr} tab={tab} setTab={setTab} setUser={setUser} spaceCode={spaceCode} changeSpace={changeSpace}/>
    </Provider>
  );
}

function AppInner({isMgr,tab,setTab,setUser,spaceCode,changeSpace}){
  const {messages,orders,now,config,spacesStatus}=useContext(Ctx);

  // Sync spaces list to Firebase
  const syncSpaces=()=>{}; // Spaces derived from accounts in Firebase

  const unreadMsgs=messages.filter(m=>m.from===(isMgr?'closeuse':'manager')&&!m.seen).length;
  const nonAppeles=orders.filter(o=>o.status===S.NEW||(o.timerExp&&now>o.timerExp&&[S.INJOIGNABLE,S.RAPPELE,S.REPORTE].includes(o.status))).length;

  const isOnline=(code)=>{
    // Check Firebase status first, then localStorage fallback
    const fbSt=spacesStatus[code];
    if(fbSt&&fbSt.lastSeen)return(now-fbSt.lastSeen)<60000;
    return false;
  };
  const [spaces,setSpaces]=useState([spaceCode]);
  const [accountsMeta,setAccountsMeta]=useState({});
  useEffect(()=>{
    if(!db)return;
    const unsub=db.collection('global').doc('accounts').onSnapshot(snap=>{
      if(snap.exists&&snap.data().list){
        const accs=snap.data().list;
        const s=[...new Set(accs.map(a=>a.space))];
        if(!s.includes(spaceCode))s.push(spaceCode);
        setSpaces(s);
        const m={};accs.forEach(a=>{m[a.space]={name:a.name,code:a.code}});
        setAccountsMeta(m);
      }
    });
    return()=>unsub();
  },[spaceCode]);

  const getSpaceName=(id)=>accountsMeta[id]?.name||id;
  const getSpaceCode=(id)=>accountsMeta[id]?.code||id;

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {isMgr&&(
        <div style={{background:'#111',padding:'8px 12px',display:'flex',alignItems:'center',gap:6,flexShrink:0,overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
          {spaces.map(s=>{
            const online=isOnline(s);
            const name=getSpaceName(s);
            return(
              <button key={s} onClick={()=>changeSpace(s)} onContextMenu={e=>{e.preventDefault();if(spaces.length>1&&confirm(`Supprimer l'espace "${name}" ?`)){const ns=spaces.filter(x=>x!==s);syncSpaces(ns);setSpaces(ns);if(spaceCode===s)changeSpace(ns[0])}}} style={{padding:'5px 12px',borderRadius:10,fontSize:12,fontWeight:spaceCode===s?700:400,background:spaceCode===s?'#fff':'rgba(255,255,255,0.08)',color:spaceCode===s?'#111':'#888',display:'flex',alignItems:'center',gap:6,flexShrink:0,border:spaceCode===s?'none':'1px solid rgba(255,255,255,0.1)'}}>
                <span style={{width:7,height:7,borderRadius:4,background:online?'#22C55E':'#555',flexShrink:0}}/>
                {name}
              </button>
            );
          })}

        </div>
      )}

      {!isMgr&&tab==='orders'&&<OrdersPage isMgr={false}/>}
      {!isMgr&&tab==='report'&&<ReportPage/>}
      {!isMgr&&tab==='chat'&&<ChatPage isMgr={false}/>}
      {!isMgr&&tab==='config'&&<ConfigPage isManager={false}/>}
      {isMgr&&tab==='dashboard'&&<ManagerDashboard/>}
      {isMgr&&tab==='orders'&&<OrdersPage isMgr={true}/>}
      {isMgr&&tab==='chat'&&<ChatPage isMgr={true}/>}
      {isMgr&&tab==='report'&&<ReportPage/>}
      {isMgr&&tab==='config'&&<ConfigPage isManager={true}/>}

      {/* Notification popup for closeuse only — outside of all pages */}
      {tab!=='chat'&&<NotificationPopup isMgr={isMgr}/>}
      <NotifEngine isMgr={isMgr}/>

      <div className="bottom-nav">
        {isMgr&&<button className={tab==='dashboard'?'active':''} onClick={()=>setTab('dashboard')} style={{position:'relative'}}><I.dash/><NavBadge count={nonAppeles}/>Dashboard</button>}
        <button className={tab==='orders'?'active':''} onClick={()=>setTab('orders')} style={{position:'relative'}}><I.list/>{!isMgr&&<NavBadge count={nonAppeles}/>}Commandes</button>
        <button className={tab==='chat'?'active':''} onClick={()=>setTab('chat')} style={{position:'relative'}}><I.chat/><NavBadge count={unreadMsgs}/>Chat</button>
        <button className={tab==='report'?'active':''} onClick={()=>setTab('report')}><I.chart/>Rapport</button>
        <button className={tab==='config'?'active':''} onClick={()=>setTab('config')}><I.settings/>Config</button>
        <button onClick={()=>{if(confirm('Tu veux vraiment te déconnecter ?')){localStorage.removeItem('cp_user');setUser(null)}}}><I.user/>Déco</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
