function taskStatus(im,ty,schedDate){
  const ac=fleet.find(a=>a.immat===im);if(!ac)return{st:"pending"};
  const lastKey=ty==="pointFixe"?"lastPointFixe":ty==="lavage"?"lastLavage":"lastCorrosion";
  const lastDate=ac[lastKey];const minInt=MIN_INT[ty];
  if(lastDate&&lastDate>=schedDate){const late=lastDate>schedDate;return{st:"done",doneDate:late?lastDate:null};}
  if(ty==="pointFixe"){const lf=ac.lastFlight,lp=ac.lastPointFixe;const base=(!lf&&!lp)?null:(!lp)?lf:(!lf)?lp:(lf>lp?lf:lp);if(base){const gap=daysBetween(base,schedDate);if(gap<minInt)return{st:"skip",label:`Dern. ${base===lf?"vol":"Pt Fixe"} -${minInt-gap}j`};}}
  else{if(lastDate){const gap=daysBetween(lastDate,schedDate);if(gap<minInt)return{st:"skip",label:`Dern. ${TYPE_LABEL[ty]} -${minInt-gap}j`};}}
  if(schedDate<today)return{st:"missed"};
  return{st:"pending"};
}

// ===== SCHEDULE =====
function generateSchedule(){
  const nd=dim(cM,cY),sd=new Date(cY,cM,1),sc={};
  for(let i=0;i<nd;i++){const d=dk(addD(sd,i));sc[d]={pointFixe:[],lavage:[],corrosion:[]};}
  Object.keys(sc).forEach(d=>{if(d<today)sc[d]._past=true;});
  const af=fleet.filter(a=>a.active),needs=[];
  af.forEach(ac=>{if(!ac.lastFlight)return;const lf=new Date(ac.lastFlight);
    const pfR=ac.lastPointFixe?new Date(ac.lastPointFixe):null,pfB=pfR&&pfR>lf?pfR:lf;
    needs.push({im:ac.immat,ty:"pointFixe",due:addD(pfB,7),pr:addD(pfB,7).getTime()});
    const lR=ac.lastLavage?new Date(ac.lastLavage):lf;needs.push({im:ac.immat,ty:"lavage",due:addD(lR,9),pr:addD(lR,9).getTime()});
    const cR=ac.lastCorrosion?new Date(ac.lastCorrosion):lf;needs.push({im:ac.immat,ty:"corrosion",due:addD(cR,9),pr:addD(cR,9).getTime()});
  });
  needs.sort((a,b)=>a.pr-b.pr);const used=new Set();
  for(let i=0;i<needs.length;i++){const n=needs[i],k=`${n.im}-${n.ty}-${n.due.getTime()}`;if(used.has(k))continue;
    for(let j=0;j<nd;j++){const d=addD(sd,j),d2=dk(d);if(d2<today||isWE(d2)||d<n.due)continue;const s=sc[d2];if(!s)continue;
      if(n.ty==="pointFixe"&&s.pointFixe.length>=3)continue;if(n.ty==="lavage"&&s.lavage.length>=3)continue;if(n.ty==="corrosion"&&s.corrosion.length>=1)continue;
      if(n.ty==="pointFixe"&&(s.lavage.includes(n.im)||s.corrosion.includes(n.im)))continue;
      if((n.ty==="lavage"||n.ty==="corrosion")&&s.pointFixe.includes(n.im))continue;
      if(s[n.ty].includes(n.im))continue;
      s[n.ty].push(n.im);used.add(k);const me=dk(new Date(cY,cM,nd));
      if(n.ty!=="pointFixe"){const nx=addD(d,9);if(dk(nx)<=me){needs.push({im:n.im,ty:n.ty,due:nx,pr:nx.getTime()});needs.sort((a,b)=>a.pr-b.pr);}}
      else{const nx=addD(d,7);if(dk(nx)<=me){needs.push({im:n.im,ty:"pointFixe",due:nx,pr:nx.getTime()});needs.sort((a,b)=>a.pr-b.pr);}}break;
    }
  }
  sc._genDate=today;return sc;
}
function publishSchedule(){pubSched=generateSchedule();if(db){db.ref("schedules/"+mKey(cM,cY)).set(pubSched);if(pubSched[today])db.ref("todaySchedule").set(pubSched[today]);}render();}

// ===== FIREBASE =====
function initFB(){try{
  firebase.initializeApp(FC);db=firebase.database();
  db.ref(".info/connected").on("value",s=>{document.getElementById("cs").innerHTML=(s.val()?'<span class="cdot on"></span>Connecté':'<span class="cdot off"></span>Hors ligne');});
  db.ref("fleet").on("value",s=>{const d=s.val();if(d)fleet=Object.values(d);else{fleet=defFleet();pushAll();}loadOrGen();});
  db.ref("pendingSubmissions").on("value",s=>{pendingSubs=s.val()||{};render();});
  db.ref("config").on("value",s=>{const c=s.val()||{};sigName=c.sigName||"";sigPost=c.sigPost||"";sigImage=c.sigImage||"";});
}catch(e){fleet=defFleet();publishSchedule();}}
function loadOrGen(){if(!db){pubSched=generateSchedule();render();return;}db.ref("schedules/"+mKey(cM,cY)).once("value",s=>{const d=s.val();if(d){pubSched=d;render();}else publishSchedule();});}

// ===== VALIDATION =====
function approveSubmission(id){
  const p=pendingSubs[id];if(!p||!db)return;
  db.ref("fleet/"+fbK(p.immat)+"/"+p.field).set(p.value);
  db.ref("pendingSubmissions/"+id).remove();
}
function rejectSubmission(id){if(db)db.ref("pendingSubmissions/"+id).remove();}
function approveAll(){Object.keys(pendingSubs).forEach(id=>approveSubmission(id));}

// ===== STATS =====
const tl=t=>t==="pointFixe"?"POINT FIXE":t==="lavage"?"LAVAGE":"TRAIT. CORROSION";
const tls=t=>TYPE_LABEL[t];const tH=t=>t==="pointFixe"?"pf-h":t==="lavage"?"lav-h":"tc-h";const tP=t=>t==="pointFixe"?"pending-pf":t==="lavage"?"pending-lav":"pending-tc";
function getSt(){if(!pubSched)return{pf:0,lv:0,co:0,dn:0,ms:0,total:0,act:0,sz:fleet.length,pend:0};
  let pf=0,lv=0,co=0,dn=0,ms=0,total=0;
  Object.entries(pubSched).forEach(([dt,s])=>{if(!s||dt.startsWith("_"))return;["pointFixe","lavage","corrosion"].forEach(ty=>{if(!s[ty])return;s[ty].forEach(im=>{total++;const r=taskStatus(im,ty,dt);if(r.st==="done")dn++;else if(r.st==="missed")ms++;});});pf+=(s.pointFixe||[]).length;lv+=(s.lavage||[]).length;co+=(s.corrosion||[]).length;});
  return{pf,lv,co,dn,ms,total,act:fleet.filter(a=>a.active&&a.lastFlight).length,sz:fleet.length,pend:Object.keys(pendingSubs).length};}

function rSch(){
  if(!pubSched){document.getElementById("vSch").innerHTML=`<div style="text-align:center;padding:40px;color:var(--text2)">Chargement...</div>`;return;}
  const nd=dim(cM,cY),sd=new Date(cY,cM,1),le=new Date(cY,cM,nd);
  let mon=new Date(sd);while(mon.getDay()!==1)mon.setDate(mon.getDate()-1);
  let fri=new Date(le);while(fri.getDay()!==5)fri.setDate(fri.getDate()+1);
  const wks=[];let cur=new Date(mon);while(cur<=fri){const w=[];for(let i=0;i<5;i++){w.push({d:dk(cur),in:cur.getMonth()===cM&&cur.getFullYear()===cY});cur.setDate(cur.getDate()+1);}cur.setDate(cur.getDate()+2);wks.push(w);}

  let h=`<div class="month-nav no-print"><button onclick="pM()">◀</button><div class="month-label">${MO[cM]} ${cY}</div><button onclick="nM()">▶</button>

  h+=`<div class="legend-bar no-print"><div class="legend-item"><div class="ld ld-p"></div>À faire</div><div class="legend-item"><div class="ld ld-d"></div>✓ Fait</div><div class="legend-item"><div class="ld ld-m"></div>✗ Manqué</div><div class="legend-item"><div class="ld ld-s"></div>— Inutile</div></div>`;
  const pc=Object.keys(pendingSubs).length;
  if(pc)h+=`<div onclick="sv('validation')" style="background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:10px;padding:10px 18px;margin-bottom:14px;cursor:pointer;display:flex;justify-content:space-between;font-weight:800;font-size:13px;color:var(--warn)" class="no-print"><span>📋 ${pc} saisie(s) en attente de validation</span><span>Voir →</span></div>`;

  wks.forEach(w=>{
    const inW=w.filter(x=>x.in);const ws=inW.length?inW[0].d:w[0].d,we=inW.length?inW[inW.length-1].d:w[4].d;
    let wDone=0,wTotal=0;
    w.forEach(({d,in:inM})=>{if(!inM)return;const sl=pubSched[d];if(!sl)return;const ht=(sl.pointFixe||[]).length||(sl.lavage||[]).length||(sl.corrosion||[]).length;if(!ht)return;["pointFixe","lavage","corrosion"].forEach(ty=>{if(!sl[ty])return;sl[ty].forEach(im=>{const r=taskStatus(im,ty,d);if(r.st!=="skip"){wTotal++;if(r.st==="done")wDone++;}});});});
    const wPct=wTotal?Math.round(wDone/wTotal*100):0;const bc=wPct>=80?"var(--ok)":wPct>=40?"var(--tc)":"var(--dn)";
    h+=`<div class="wblock"><div class="wheader"><span class="wheader-label">Sem. ${fmt(ws)} — ${fmt(we)}</span><div class="wprog">${wDone}/${wTotal}<div class="wprog-bar"><div class="wprog-fill" style="width:${wPct}%;background:${bc}"></div></div>${wPct}%</div></div><div class="wgrid">`;
    w.forEach(({d,in:inM})=>{
      const dt=new Date(d+'T12:00:00'),isT=d===today,isP=d<today;
      if(!inM){h+=`<div class="dcol outside"><div class="dhead">${WD[dt.getDay()]} ${dt.getDate()}</div></div>`;return;}
      const sl=pubSched[d]||{pointFixe:[],lavage:[],corrosion:[]};
      const hasTasks=(sl.pointFixe||[]).length||(sl.lavage||[]).length||(sl.corrosion||[]).length;
      const isPastEmpty=isP&&!isT&&!hasTasks;
      h+=`<div class="dcol${isT?' today':''}${isP&&!isT?' past':''}"><div class="dhead">${WD[dt.getDay()]} ${dt.getDate()}</div>`;
      if(isPastEmpty){h+=`<div style="display:flex;align-items:center;justify-content:center;height:60px;opacity:.3"><div style="text-align:center"><svg style="width:18px;height:18px;margin:0 auto 3px;display:block" fill="none" stroke="var(--text3)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="font-size:7px;font-weight:700;text-transform:uppercase;color:var(--text3)">Jour passé</span></div></div>`;}
      else{["pointFixe","lavage","corrosion"].forEach(ty=>{
        if(!sl[ty]||!sl[ty].length)return;
        h+=`<div class="tsec"><div class="tsec-head ${tH(ty)}">${tl(ty)}</div>`;
        sl[ty].forEach(im=>{const r=taskStatus(im,ty,d);let cls,ico,bdg="";
          if(r.st==="done"){cls="done";ico="✓";bdg=r.doneDate?`<span class="tp-badge" style="background:var(--ok);color:#fff">FAIT ${fmt(r.doneDate)}</span>`:`<span class="tp-badge" style="background:var(--ok);color:#fff">FAIT</span>`;}
          else if(r.st==="missed"){cls="missed";ico="✗";bdg=`<span class="tp-badge" style="background:var(--dn);color:#fff">MANQUÉ</span>`;}
          else if(r.st==="skip"){cls="skip";ico="—";bdg=`<span class="tp-badge" style="background:var(--skip);color:#fff">${r.label}</span>`;}
          else{cls=`pending ${tP(ty)}`;ico="○";}
          h+=`<div class="tp ${cls}"><div class="tp-ico">${ico}</div><span class="tp-name">${im}</span>${bdg}</div>`;
        });h+=`</div>`;
      });
      if(!hasTasks&&!isPastEmpty)h+=`<div style="font-size:9px;color:var(--text3);margin-top:14px;text-align:center">—</div>`;}
      h+=`</div>`;
    });h+=`</div></div>`;
  });
  document.getElementById("vSch").innerHTML=h;}

  document.getElementById("vAdm").innerHTML=h;}

function sSig(){sigName=document.getElementById("sN").value;sigPost=document.getElementById("sP").value;if(db){db.ref("config/sigName").set(sigName);db.ref("config/sigPost").set(sigPost);}rAdm();}
function uSig(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{sigImage=ev.target.result;if(db)db.ref("config/sigImage").set(sigImage);rAdm();};r.readAsDataURL(f);}
function rSig(){sigImage="";if(db)db.ref("config/sigImage").remove();rAdm();}
function xBk(){const d=JSON.stringify({fleet,sigName,sigPost,sigImage},null,2);const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([d],{type:"application/json"}));a.download="piste_backup.json";a.click();}
function iBk(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.fleet){fleet=d.fleet;sigName=d.sigName||"";sigPost=d.sigPost||"";sigImage=d.sigImage||"";if(db){pushAll();db.ref("config").set({sigName,sigPost,sigImage});}publishSchedule();}}catch(e){}};r.readAsText(f);e.target.value="";}

function pM(){cM--;if(cM<0){cM=11;cY--;}pubSched=null;loadOrGen();}
function nM(){cM++;if(cM>11){cM=0;cY++;}pubSched=null;loadOrGen();}
function bulkEdit(){
  const field=document.getElementById("bulkField").value;
  const date=document.getElementById("bulkDate").value;
  const target=document.getElementById("bulkTarget").value;
  if(!date){alert("Sélectionnez une date");return;}
  if(!confirm(`Appliquer ${FIELD_LABELS[field]} = ${fmt(date)} à ${target==='all'?'tous les actifs':target==='ulm'?'tous les ULM':'tous les Avions'} ?`))return;
  fleet.forEach(ac=>{
    if(!ac.active)return;
    if(target==="ulm"&&ac.type!=="ULM")return;
    if(target==="avion"&&ac.type!=="Avion")return;
    ac[field]=date;
    if(db)db.ref("fleet/"+fbK(ac.immat)+"/"+field).set(date);
  });render();
}
function sv(v){cv=v;["Sch","Flt","Ret","Val","Adm"].forEach(id=>{document.getElementById("v"+id).style.display="none";const b=document.getElementById("b"+id);if(b)b.classList.remove("active");});const m={schedule:"Sch",fleet:"Flt",retards:"Ret",validation:"Val",admin:"Adm"};document.getElementById("v"+m[v]).style.display="block";const b2=document.getElementById("b"+m[v]);if(b2)b2.classList.add("active");if(v==="admin")rAdm();if(v==="validation")rVal();}
function render(){rSt();rFlt();rSch();rRet();rVal();}
function uFld(i,field,val){fleet[i][field]=val||null;if(db)db.ref("fleet/"+fbK(fleet[i].immat)+"/"+field).set(val||null);render();}
function tA(i){fleet[i].active=!fleet[i].active;if(db)db.ref("fleet/"+fbK(fleet[i].immat)+"/active").set(fleet[i].active);render();}
function rmA(i){if(!confirm("Supprimer "+fleet[i].immat+" ?"))return;const im=fleet[i].immat;fleet.splice(i,1);if(db)db.ref("fleet/"+fbK(im)).remove();render();}
function addA(){const im=document.getElementById("nI").value.trim().toUpperCase(),ty=document.getElementById("nT").value.trim()||"ULM";if(!im||fleet.find(a=>a.immat===im))return;const ac={immat:im,type:ty,active:true,lastFlight:null,lastLavage:null,lastCorrosion:null,lastPointFixe:null};fleet.push(ac);if(db)db.ref("fleet/"+fbK(im)).set(ac);document.getElementById("aR").style.display="none";document.getElementById("nI").value="";render();}
initFB();
</script>
