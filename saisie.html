<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EMACO — Saisie Vols & Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e17;--bg2:#0c1019;--bg3:#0f1520;--border:#1a1f2e;--border2:#1e2a3a;
    --text:#c8d6e5;--text2:#5a6a7e;--white:#e8eef5;
    --pf-text:#7eb8ff;--pf-bg:#1a2744;--pf-border:#2d4a7a;
    --lav-text:#7effa8;--lav-bg:#1a3a2a;--lav-border:#2d7a4a;
    --tc-text:#ffc87e;--tc-bg:#3a2a1a;--tc-border:#7a5a2d;
    --ok:#4ade80}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;font-size:15px;padding-bottom:72px}

  .header{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
  .logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#1a2744,#2d4a7a);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--pf-text)}
  .header h2{font-size:17px;color:var(--white);letter-spacing:-.3px}
  .header p{font-size:11px;color:var(--text2)}
  .conn{font-size:11px;padding:4px 10px;border-radius:12px;font-weight:600}
  .conn.on{background:#0f2e1a;color:var(--ok)}.conn.off{background:#2e0f0f;color:#f87171}

  .search-bar{padding:10px 16px;position:sticky;top:65px;z-index:40;background:var(--bg)}
  .search-bar input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit;font-size:14px}
  .search-bar input::placeholder{color:var(--text2)}

  .filter-pills{padding:4px 16px 10px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .filter-pills::-webkit-scrollbar{display:none}
  .pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;transition:all .15s}
  .pill.active{background:var(--pf-bg);border-color:var(--pf-border);color:var(--pf-text)}

  .ac-list{padding:0 16px}

  .ac-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
  .ac-head{padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .ac-head-top{display:flex;align-items:center;justify-content:space-between}
  .ac-immat{font-size:18px;font-weight:700;color:var(--white)}
  .ac-type{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--pf-bg);color:var(--pf-text);margin-left:8px}
  .chevron{font-size:16px;color:var(--text2);transition:transform .2s}
  .ac-card.open .chevron{transform:rotate(180deg)}

  .ac-dates-summary{margin-top:6px}
  .date-chip-single{font-size:12px;color:var(--text2);font-weight:500}
  .date-chip-single strong{color:var(--white);margin:0 2px}
  .chip-warn{color:#f87171;font-weight:600}
  .chip-ok{color:var(--ok);font-weight:600}

  .ac-body{padding:0 16px 16px;display:none}
  .ac-card.open .ac-body{display:block}

  .field-group{margin-bottom:16px;background:var(--bg3);border-radius:12px;padding:14px}
  .field-label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .field-row{display:flex;gap:8px;align-items:center}
  .field-row input[type="date"]{flex:1;padding:11px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit;font-size:15px;-webkit-appearance:none}
  .field-row input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.7);font-size:18px}

  .btn-today{padding:11px 14px;border-radius:10px;border:1px solid var(--lav-border);background:var(--lav-bg);color:var(--ok);cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;white-space:nowrap;-webkit-tap-highlight-color:transparent;transition:all .15s;min-width:100px;text-align:center}
  .btn-today:active{transform:scale(.96);opacity:.8}

  .field-info{font-size:12px;color:var(--text2);margin-top:6px;display:flex;justify-content:space-between}
  .field-info .ago{font-weight:600}
  .field-info .ago.recent{color:var(--ok)}
  .field-info .ago.old{color:#f87171}
  .field-info .ago.mid{color:var(--tc-text)}

  .saved-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a3a2a;color:var(--ok);padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;z-index:200;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}

  .tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:50;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom))}
  .tab{flex:1;text-align:center;padding:6px;cursor:pointer;color:var(--text2);font-size:10px;font-weight:600;-webkit-tap-highlight-color:transparent;transition:all .15s}
  .tab.active{color:var(--pf-text)}
  .tab .tab-icon{font-size:20px;display:block;margin-bottom:1px}

  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .ac-card{animation:fadeUp .25s ease}
</style>
</head>
<body>

<!-- ==================== FIREBASE CONFIG ==================== -->
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAtYDTWrrpHlKRrkJajBU87m1Pbw_mfwOQ",
  authDomain: "planning-pf-tc-la.firebaseapp.com",
  databaseURL: "https://planning-pf-tc-la-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "planning-pf-tc-la",
  storageBucket: "planning-pf-tc-la.firebasestorage.app",
  messagingSenderId: "822523737615",
  appId: "1:822523737615:web:44ef0cd81eec1f1da4d57a"
};
</script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo">✈</div>
    <div><h2>Saisie EMACO</h2><p>Mise à jour vols & maintenance</p></div>
  </div>
  <span class="conn off" id="connBadge">Hors ligne</span>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 Rechercher un aéronef..." oninput="render()">
</div>

<div class="filter-pills">
  <div class="pill active" data-f="all" onclick="setFilter('all',this)">Tous</div>
  <div class="pill" data-f="ULM" onclick="setFilter('ULM',this)">ULM</div>
  <div class="pill" data-f="Avion" onclick="setFilter('Avion',this)">Avions</div>
</div>

<div id="acList" class="ac-list"></div>
<div class="saved-toast" id="toast">✅ Sauvegardé sur Firebase</div>

<div class="tab-bar">
  <div class="tab active" data-t="vol" onclick="setTab('vol',this)"><span class="tab-icon">🛫</span>Vols</div>
  <div class="tab" data-t="lav" onclick="setTab('lav',this)"><span class="tab-icon">🚿</span>Lavage</div>
  <div class="tab" data-t="pf" onclick="setTab('pf',this)"><span class="tab-icon">🔧</span>Pt Fixe</div>
  <div class="tab" data-t="tc" onclick="setTab('tc',this)"><span class="tab-icon">🧪</span>Corrosion</div>
</div>

<script>
const toISO=d=>d.toISOString().slice(0,10);
const today=toISO(new Date());
const dAgo=n=>{const d=new Date();d.setDate(d.getDate()-n);return toISO(d);};
const daysBetween=(a,b)=>{if(!a||!b)return 999;return Math.floor((new Date(b)-new Date(a))/(86400000));};

let fleet=[], db=null, currentFilter="all", currentTab="vol", openCard=null;

function makeAc(im,ty){return{immat:im,type:ty,active:true,lastFlight:dAgo(10),lastLavage:dAgo(15),lastCorrosion:dAgo(15),lastPointFixe:dAgo(30)};}
const DEF=["TY-43L","TY-44L","TY-45L","TY-46L","TY-47L","TY-48L","TY-49L","TY-50L","TY-51L","TY-52L","TY-53L","TY-54L","TY-55L","TY-56L","TY-60L","TY-61L","TY-62L","TY-63L","TY-64L"].map(i=>makeAc(i,"ULM")).concat([makeAc("TY-27A","Avion"),makeAc("TY-29A","Avion")]);

function fbKey(im){return im.replace(/[.#$/\[\]]/g,"_");}

function initFB(){
  try{
    if(FIREBASE_CONFIG.apiKey==="VOTRE_API_KEY"){
      document.getElementById("connBadge").textContent="Non configuré";
      fleet=JSON.parse(JSON.stringify(DEF));render();return;
    }
    firebase.initializeApp(FIREBASE_CONFIG);db=firebase.database();
    db.ref(".info/connected").on("value",s=>{
      const on=!!s.val();
      const b=document.getElementById("connBadge");
      b.className="conn "+(on?"on":"off");b.textContent=on?"✓ Connecté":"Hors ligne";
    });
    db.ref("fleet").on("value",snap=>{
      const d=snap.val();
      if(d){fleet=Object.values(d).filter(a=>a.active!==false);}
      else{fleet=JSON.parse(JSON.stringify(DEF));pushAll();}
      render();
    });
  }catch(e){console.error(e);fleet=JSON.parse(JSON.stringify(DEF));render();}
}
function pushAll(){if(!db)return;const o={};fleet.forEach(a=>{o[fbKey(a.immat)]=a;});db.ref("fleet").set(o);}

function updateField(immat,field,value){
  const ac=fleet.find(a=>a.immat===immat);if(!ac)return;
  ac[field]=value||null;
  if(db)db.ref("fleet/"+fbKey(immat)+"/"+field).set(value||null);
  showToast();render();
}
function setToday(immat,field){
  updateField(immat,field,today);
  if(navigator.vibrate)navigator.vibrate(50);
}
function showToast(){const t=document.getElementById("toast");t.style.display="block";setTimeout(()=>{t.style.display="none";},1500);}

function setFilter(f,el){currentFilter=f;document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));el.classList.add("active");render();}
function setTab(t,el){currentTab=t;document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));el.classList.add("active");render();}
function toggleCard(im){openCard=openCard===im?null:im;render();}

function fmtShort(d){if(!d)return"—";const x=new Date(d);return x.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit"});}
function fmtFull(d){if(!d)return"Non renseigné";return new Date(d).toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});}
function fmtAgo(d){
  if(!d)return"";const days=daysBetween(d,today);
  if(days===0)return"Aujourd'hui";if(days===1)return"Hier";if(days<0)return"Dans "+(-days)+"j";
  return"Il y a "+days+"j";
}
function agoClass(d,warnAt,critAt){
  if(!d)return"old";const days=daysBetween(d,today);
  if(days<=warnAt)return"recent";if(days<=critAt)return"mid";return"old";
}

function render(){
  const q=document.getElementById("searchInput").value.trim().toUpperCase();
  let list=fleet.filter(a=>{
    if(q&&!a.immat.includes(q))return false;
    if(currentFilter!=="all"&&a.type!==currentFilter)return false;
    return true;
  });
  list.sort((a,b)=>a.immat.localeCompare(b.immat));

  if(!list.length){
    document.getElementById("acList").innerHTML=`<div style="text-align:center;padding:40px;color:var(--text2)"><div style="font-size:32px;margin-bottom:10px">🔍</div>Aucun aéronef trouvé</div>`;
    return;
  }

  let h="";
  list.forEach(ac=>{
    const isOpen=openCard===ac.immat;
    const lfD=daysBetween(ac.lastFlight,today);
    const llD=daysBetween(ac.lastLavage,today);
    const lpD=daysBetween(ac.lastPointFixe,today);
    const lcD=daysBetween(ac.lastCorrosion,today);

    h+=`<div class="ac-card${isOpen?' open':''}">`;
    // HEADER - show only the date relevant to current tab
    let summaryDate, summaryDays, summaryLabel;
    if(currentTab==="vol"){summaryDate=ac.lastFlight;summaryDays=lfD;summaryLabel="Dern. vol";}
    else if(currentTab==="lav"){summaryDate=ac.lastLavage;summaryDays=llD;summaryLabel="Dern. lavage";}
    else if(currentTab==="pf"){summaryDate=ac.lastPointFixe;summaryDays=lpD;summaryLabel="Dern. Pt fixe";}
    else{summaryDate=ac.lastCorrosion;summaryDays=lcD;summaryLabel="Dern. trait. corrosion";}
    const summaryClass=!summaryDate?"chip-warn":summaryDays<=5?"chip-ok":summaryDays<=9?"":"chip-warn";

    h+=`<div class="ac-head" onclick="toggleCard('${ac.immat}')">
      <div class="ac-head-top">
        <div style="display:flex;align-items:center">
          <span class="ac-immat">${ac.immat}</span>
          <span class="ac-type" style="${ac.type!=='ULM'?'background:#2a1a44;color:#b87eff':''}">${ac.type}</span>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="ac-dates-summary">
        <span class="date-chip-single">${summaryLabel}: <strong>${fmtShort(summaryDate)||'—'}</strong> <span class="${summaryClass}">${fmtAgo(summaryDate)}</span></span>
      </div>
    </div>`;

    // BODY
    h+=`<div class="ac-body">`;

    const fields=[];
    if(currentTab==="vol")fields.push({key:"lastFlight",icon:"🛫",label:"Dernier Vol",warn:5,crit:7},{key:"lastLavage",icon:"🚿",label:"Dernier Lavage",warn:9,crit:14});
    if(currentTab==="lav")fields.push({key:"lastLavage",icon:"🚿",label:"Dernier Lavage",warn:9,crit:14});
    if(currentTab==="pf")fields.push({key:"lastPointFixe",icon:"🔧",label:"Dernier Point Fixe",warn:7,crit:9});
    if(currentTab==="tc")fields.push({key:"lastCorrosion",icon:"🧪",label:"Dernier Traitement Corrosion",warn:9,crit:14});

    fields.forEach(f=>{
      const val=ac[f.key];
      const ago=fmtAgo(val);
      const cls=agoClass(val,f.warn,f.crit);
      h+=`<div class="field-group">
        <div class="field-label">${f.icon} ${f.label}</div>
        <div class="field-row">
          <input type="date" value="${val||''}" onchange="updateField('${ac.immat}','${f.key}',this.value)">
          <button class="btn-today" onclick="event.stopPropagation();setToday('${ac.immat}','${f.key}')">📅 Aujourd'hui</button>
        </div>
        <div class="field-info">
          <span>${fmtFull(val)}</span>
          <span class="ago ${cls}">${ago}</span>
        </div>
      </div>`;
    });

    h+=`</div></div>`;
  });

  document.getElementById("acList").innerHTML=h;
}

initFB();
</script>
</body>
</html>
