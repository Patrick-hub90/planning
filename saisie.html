<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PISTE — Saisie Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef1f6;--bg2:#fff;--bg3:#f6f8fb;--border:#dce3ed;--text:#0f172a;--text2:#64748b;--text3:#94a3b8;
--pf:#3b82f6;--pf-bg:#dbeafe;--pf-bd:#bfdbfe;--lav:#10b981;--lav-bg:#d1fae5;--lav-bd:#a7f3d0;
--tc:#f59e0b;--tc-bg:#fef3c7;--tc-bd:#fde68a;--vol:#7c3aed;--vol-bg:#f5f3ff;--vol-bd:#ddd6fe;
--lc:#ec4899;--lc-bg:#fdf2f8;--lc-bd:#fbcfe8;
--ok:#22c55e;--ok-bg:#dcfce7;--ok-bd:#bbf7d0;--dn:#ef4444;--dn-bg:#fee2e2;
--warn:#f97316;--warn-bg:#fff7ed;--warn-bd:#fed7aa;
--sh:0 1px 4px rgba(0,0,0,.06)}
[data-theme="dark"]{--bg:#080b12;--bg2:#111827;--bg3:#1a2236;--border:#283348;--text:#f1f5f9;--text2:#8896aa;--text3:#4b5c72;
--pf-bg:#172554;--pf-bd:#1e3a5f;--lav-bg:#064e3b;--lav-bd:#14532d;--tc-bg:#422006;--tc-bd:#713f12;--vol-bg:#1e1b4b;--vol-bd:#312e81;
--lc-bg:#831843;--lc-bd:#9d174d;--ok-bg:#14532d;--ok-bd:#166534;--dn-bg:#7f1d1d;--warn-bg:#7c2d12;--warn-bd:#9a3412;--sh:0 1px 4px rgba(0,0,0,.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
/* Login screen */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:40px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.1)}
.login-box .logo{width:56px;height:56px;border-radius:16px;margin:0 auto 20px}
.login-box h1{font-size:20px;font-weight:900;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--text2);margin-bottom:24px}
.login-box input{width:100%;padding:14px 18px;border-radius:14px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;font-size:16px;font-weight:700;text-align:center;letter-spacing:4px;margin-bottom:16px}
.login-box button{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(59,130,246,.3)}
.login-box .error{color:var(--dn);font-size:12px;font-weight:700;margin-top:10px;display:none}
/* App (hidden until login) */
.app{display:none;padding-bottom:72px}
.header{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh)}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center}
.logo svg{width:20px;height:20px;fill:#fff}
.header h2{font-size:15px;font-weight:800}.header p{font-size:10px;color:var(--text2)}
.conn{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;border:1px solid}
.conn.on{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-bd)}.conn.off{background:var(--dn-bg);color:var(--dn);border-color:#fecaca}
.theme-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center}
.theme-btn svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:2}
.search-bar{padding:10px 16px;position:sticky;top:61px;z-index:40;background:var(--bg)}
.search-bar input{width:100%;padding:10px 14px 10px 38px;border-radius:12px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:inherit;font-size:14px;box-shadow:var(--sh)}
.search-wrap{position:relative}.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:none;stroke:var(--text2);stroke-width:2}
.pill-bar{padding:4px 16px 8px;display:flex;gap:8px;overflow-x:auto}.pill-bar::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:var(--sh)}
.pill.active{background:var(--pf);border-color:var(--pf);color:#fff}
.ac-list{padding:0 16px}
.ac-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}
.ac-head{padding:12px 16px;cursor:pointer}
.ac-head-top{display:flex;align-items:center;justify-content:space-between}
.ac-immat{font-size:17px;font-weight:800}.ac-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;margin-left:8px;text-transform:uppercase}
.type-ulm{background:var(--pf-bg);color:var(--pf);border:1px solid var(--pf-bd)}.type-avion{background:var(--vol-bg);color:var(--vol);border:1px solid var(--vol-bd)}
.chevron{color:var(--text2);transition:transform .2s}.ac-card.open .chevron{transform:rotate(180deg)}
.ac-summary{margin-top:6px}.date-text{font-size:12px;color:var(--text2)}.date-text strong{color:var(--text)}.date-text .warn{color:var(--dn);font-weight:700}.date-text .ok{color:var(--ok);font-weight:700}
.sched-badge,.done-badge,.pending-badge{font-size:10px;font-weight:800;padding:3px 10px;border-radius:8px;white-space:nowrap}
.sched-badge{animation:pulse 2s infinite}
.sched-pf{background:var(--pf-bg);color:var(--pf);border:1px solid var(--pf-bd)}.sched-lav{background:var(--lav-bg);color:var(--lav);border:1px solid var(--lav-bd)}.sched-tc{background:var(--tc-bg);color:var(--tc);border:1px solid var(--tc-bd)}.sched-lc{background:var(--lc-bg);color:var(--lc);border:1px solid var(--lc-bd)}
.done-badge{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd);animation:none}
.pending-badge{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.ac-body{padding:0 16px 16px;display:none}.ac-card.open .ac-body{display:block}
.field-group{margin-bottom:12px;background:var(--bg3);border-radius:14px;padding:14px;border:1px solid var(--border)}
.field-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:8px}
.field-row{display:flex;gap:8px;align-items:center}
.field-row input[type="date"]{flex:1;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:inherit;font-size:14px;box-shadow:var(--sh)}
[data-theme="dark"] .field-row input::-webkit-calendar-picker-indicator{filter:invert(.7)}
.btn-today{padding:10px 14px;border-radius:10px;border:none;background:var(--pf);color:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;min-width:100px;text-align:center;box-shadow:0 2px 6px rgba(59,130,246,.25)}
.btn-today:active{transform:scale(.96)}
.btn-done{background:var(--ok)}.btn-undo{background:var(--dn)}
.field-info{font-size:11px;color:var(--text2);margin-top:6px;display:flex;justify-content:space-between}
.field-info .ago{font-weight:700}.field-info .ago.recent{color:var(--ok)}.field-info .ago.mid{color:var(--tc)}.field-info .ago.old{color:var(--dn)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:14px;font-weight:700;font-size:13px;z-index:200;display:none;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast-ok{background:var(--ok);color:#fff}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.confirm-modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:360px;width:90%;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.15)}
.confirm-modal h3{font-size:16px;font-weight:800;margin-bottom:6px}
.confirm-modal p{font-size:13px;color:var(--text2);margin-bottom:16px}
.confirm-modal .detail{font-size:20px;font-weight:900;color:var(--pf);margin:12px 0}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:14px;border-radius:14px;border:none;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}
.confirm-yes{background:var(--pf);color:#fff}.confirm-no{background:var(--bg3);color:var(--text2);border:1px solid var(--border)!important}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:50;padding:4px 4px;padding-bottom:max(4px,env(safe-area-inset-bottom))}
.tab{flex:1;text-align:center;padding:5px 2px;cursor:pointer;color:var(--text2);font-size:9px;font-weight:600;border-radius:8px;margin:1px}
.tab.active{color:var(--pf);background:var(--pf-bg)}
.tab svg{display:block;margin:0 auto 1px;width:18px;height:18px}.tab.active svg{stroke:var(--pf)}
</style>
</head>
<body>
<script>const FC={apiKey:"AIzaSyAtYDTWrrpHlKRrkJajBU87m1Pbw_mfwOQ",authDomain:"planning-pf-tc-la.firebaseapp.com",databaseURL:"https://planning-pf-tc-la-default-rtdb.europe-west1.firebasedatabase.app",projectId:"planning-pf-tc-la",storageBucket:"planning-pf-tc-la.firebasestorage.app",messagingSenderId:"822523737615",appId:"1:822523737615:web:44ef0cd81eec1f1da4d57a"};</script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
<div class="login-box">
  <div class="logo" style="width:56px;height:56px;border-radius:16px;margin:0 auto 20px"><svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:#fff"><path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0011.5 2 1.5 1.5 0 0010 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg></div>
  <h1>Saisie PISTE</h1>
  <p>Entrez le mot de passe de la semaine pour accéder à l'application</p>
  <input type="password" id="loginPwd" placeholder="••••••" maxlength="8" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">Accéder</button>
  <div class="error" id="loginError">Mot de passe incorrect</div>
</div></div>

<!-- APP -->
<div class="app" id="app">
<div class="header">
<div style="display:flex;align-items:center;gap:10px">
<div class="logo"><svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5A1.5 1.5 0 0011.5 2 1.5 1.5 0 0010 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg></div>
<div><h2>Saisie PISTE</h2><p>Lavage · Pt Fixe · Trait. Corrosion · Lav. Compresseur</p></div>
</div>
<div style="display:flex;gap:6px;align-items:center">
<button class="theme-btn" onclick="tTh()"><svg id="tIco" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
<span class="conn off" id="connBadge">--</span>
</div></div>

<div class="search-bar"><div class="search-wrap">
<svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
<input type="text" id="searchInput" placeholder="Rechercher..." oninput="render()">
</div></div>

<div class="pill-bar">
<div class="pill active" onclick="setFilter('all',this)">Tous</div>
<div class="pill" onclick="setFilter('ULM',this)">ULM</div>
<div class="pill" onclick="setFilter('Avion',this)">Avions</div>
</div>

<div id="acList" class="ac-list"></div>
<div class="toast toast-ok" id="toastOk">✓ Soumis — en attente de validation</div>
<div id="confirmOverlay" class="overlay" style="display:none"></div>

<div class="tab-bar">
<div class="tab active" onclick="setTab('vol',this)"><svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>Vols</div>
<div class="tab" onclick="setTab('lav',this)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v6a4 4 0 014 4v1a2 2 0 01-2 2H10a2 2 0 01-2-2v-1a4 4 0 014-4z"/><path d="M6 22v-4a2 2 0 012-2h8a2 2 0 012 2v4"/></svg>Lavage</div>
<div class="tab" onclick="setTab('pf',this)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>Pt Fixe</div>
<div class="tab" onclick="setTab('tc',this)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 2v7.5a2 2 0 01-.2.9L4.7 20.6a1 1 0 00.9 1.4h12.8a1 1 0 00.9-1.4l-5.1-10.2A2 2 0 0114 9.5V2"/><path d="M8.5 2h7"/></svg>Corrosion</div>
<div class="tab" onclick="setTab('lc',this)"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M4.2 4.2l2.8 2.8m10 10l2.8 2.8M1 12h4m14 0h4M4.2 19.8l2.8-2.8m10-10l2.8-2.8"/></svg>Lav.Comp.</div>
</div>
</div>

<script>
const iso=d=>{const x=new Date(d);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');};
const today=iso(new Date());
const dAgo=n=>{const d=new Date();d.setDate(d.getDate()-n);return iso(d);};
const daysBetween=(a,b)=>{if(!a||!b)return 999;return Math.round((new Date(b+'T12:00:00')-new Date(a+'T12:00:00'))/86400000);};
const fbK=im=>im.replace(/[.#$/\[\]]/g,"_");
const FLABELS={lastFlight:"Dernier Vol",lastLavage:"Dernier Lavage",lastPointFixe:"Dernier Point Fixe",lastCorrosion:"Dernier Trait. Corrosion",lastLavComp:"Dernier Lav. Compresseur"};

let fleet=[],db=null,todaySched=null,pendingSubs={},weeklyPwd="",currentFilter="all",currentTab="vol",openCard=null,isDark=false;

function tTh(){isDark=!isDark;document.documentElement.setAttribute("data-theme",isDark?"dark":"");localStorage.setItem("piste_theme",isDark?"dark":"light");document.getElementById("tIco").innerHTML=isDark?'<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>':'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';}
if(localStorage.getItem("piste_theme")==="dark")tTh();

// ===== LOGIN =====
function doLogin(){
  const pwd=document.getElementById("loginPwd").value.trim();
  if(pwd===weeklyPwd){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="block";
    sessionStorage.setItem("piste_logged","1");
  } else {
    document.getElementById("loginError").style.display="block";
    if(navigator.vibrate)navigator.vibrate(200);
  }
}

function initFB(){try{
  firebase.initializeApp(FC);db=firebase.database();
  db.ref(".info/connected").on("value",s=>{const on=!!s.val();const b=document.getElementById("connBadge");b.className="conn "+(on?"on":"off");b.textContent=on?"Connecté":"Hors ligne";});
  // Get weekly password
  db.ref("weeklyPassword").on("value",s=>{
    weeklyPwd=s.val()||"piste";
    // Auto-login if session valid
    if(sessionStorage.getItem("piste_logged")==="1"){
      document.getElementById("loginScreen").style.display="none";
      document.getElementById("app").style.display="block";
    }
  });
  db.ref("fleet").on("value",s=>{const d=s.val();if(d)fleet=Object.values(d).filter(a=>a.active!==false);else fleet=[];render();});
  db.ref("todaySchedule").on("value",s=>{todaySched=s.val()||null;render();});
  db.ref("pendingSubmissions").on("value",s=>{pendingSubs=s.val()||{};render();});
}catch(e){console.error(e);}}

function askConfirm(immat,field,value){
  const fmtD=new Date(value+'T12:00:00').toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
  document.getElementById("confirmOverlay").innerHTML=`<div class="confirm-modal">
    <h3>Confirmer la saisie</h3>
    <p>${FLABELS[field]||field} pour <strong>${immat}</strong></p>
    <div class="detail">${fmtD}</div>
    <p style="font-size:12px;color:var(--warn)">⏳ Soumis à validation admin</p>
    <div class="confirm-btns">
      <button class="confirm-no" onclick="closeC()">Annuler</button>
      <button class="confirm-yes" onclick="submitP('${immat}','${field}','${value}');closeC()">Confirmer</button>
    </div></div>`;
  document.getElementById("confirmOverlay").style.display="flex";
}
function closeC(){document.getElementById("confirmOverlay").style.display="none";}
function submitP(immat,field,value){
  if(!db)return;
  db.ref("pendingSubmissions/"+Date.now()+"_"+Math.random().toString(36).substr(2,4)).set({immat,field,value,submittedAt:new Date().toISOString(),label:FLABELS[field]||field});
  if(navigator.vibrate)navigator.vibrate([50,30,50]);
  const t=document.getElementById("toastOk");t.style.display="block";setTimeout(()=>{t.style.display="none";},2500);
}
function reqToday(im,f){askConfirm(im,f,today);}
function reqDate(im,f,el){if(el.value)askConfirm(im,f,el.value);}

function setFilter(f,el){currentFilter=f;document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));el.classList.add("active");render();}
function setTab(t,el){currentTab=t;document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));el.classList.add("active");render();}
function toggleCard(im){openCard=openCard===im?null:im;render();}

function fmtShort(d){if(!d)return"—";return new Date(d+'T12:00:00').toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function fmtFull(d){if(!d)return"Non renseigné";return new Date(d+'T12:00:00').toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});}
function fmtAgo(d){if(!d)return"";const days=daysBetween(d,today);if(days<0)return"";if(days===0)return"Aujourd'hui";if(days===1)return"Hier";return"Il y a "+days+"j";}
function agoClass(d,w,c){if(!d)return"old";const days=daysBetween(d,today);if(days<0)return"";if(days<=w)return"recent";if(days<=c)return"mid";return"old";}

function hasTaskToday(im,tab){if(!todaySched)return false;const k=tab==="pf"?"pointFixe":tab==="lav"?"lavage":tab==="tc"?"corrosion":tab==="lc"?"lavComp":null;return k&&todaySched[k]&&todaySched[k].includes(im);}
function taskField(tab){return tab==="pf"?"lastPointFixe":tab==="lav"?"lastLavage":tab==="tc"?"lastCorrosion":tab==="lc"?"lastLavComp":"lastFlight";}
function getPending(im,f){for(const[id,p]of Object.entries(pendingSubs)){if(p.immat===im&&p.field===f)return p;}return null;}

function render(){
  const q=document.getElementById("searchInput")?.value.trim().toUpperCase()||"";
  let list=fleet.filter(a=>{
    if(q&&!a.immat.includes(q))return false;
    if(currentFilter!=="all"&&a.type!==currentFilter)return false;
    if(currentTab==="lc"&&!a.hasLavComp)return false;
    return true;
  });
  list.sort((a,b)=>{const at=hasTaskToday(a.immat,currentTab)?-1:0;const bt=hasTaskToday(b.immat,currentTab)?-1:0;return at!==bt?at-bt:a.immat.localeCompare(b.immat);});

  if(!list.length){document.getElementById("acList").innerHTML=`<div style="text-align:center;padding:40px;color:var(--text2)">Aucun aéronef</div>`;return;}

  let h="";
  list.forEach(ac=>{
    const isOpen=openCard===ac.immat;
    const fld=taskField(currentTab);
    const scheduled=hasTaskToday(ac.immat,currentTab);
    const doneToday=ac[fld]===today;
    const pending=getPending(ac.immat,fld);

    let sDate=ac[fld],sLabel;
    if(currentTab==="vol")sLabel="Dern. vol";
    else if(currentTab==="lav")sLabel="Dern. lavage";
    else if(currentTab==="pf")sLabel="Dern. pt fixe";
    else if(currentTab==="tc")sLabel="Dern. trait. corr.";
    else sLabel="Dern. lav. comp.";
    const sDays=daysBetween(sDate,today);
    const sClass=!sDate?"warn":(sDays<0?"":sDays<=5?"ok":sDays<=9?"":"warn");
    const typeClass=ac.type==="ULM"?"type-ulm":"type-avion";
    const schedClass=currentTab==="pf"?"sched-pf":currentTab==="lav"?"sched-lav":currentTab==="tc"?"sched-tc":currentTab==="lc"?"sched-lc":"sched-pf";

    h+=`<div class="ac-card${isOpen?' open':''}"><div class="ac-head" onclick="toggleCard('${ac.immat}')">
      <div class="ac-head-top">
        <div style="display:flex;align-items:center"><span class="ac-immat">${ac.immat}</span><span class="ac-type ${typeClass}">${ac.type}</span></div>
        <div style="display:flex;align-items:center;gap:6px">
          ${pending?`<span class="pending-badge">⏳ En attente</span>`:doneToday?`<span class="done-badge">✓ Fait</span>`:scheduled?`<span class="sched-badge ${schedClass}">PRÉVU</span>`:''}
          <span class="chevron"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></span>
        </div>
      </div>
      <div class="ac-summary"><span class="date-text">${sLabel}: <strong>${fmtShort(sDate)}</strong> <span class="${sClass}">${fmtAgo(sDate)}</span></span></div>
    </div><div class="ac-body">`;

    const fields=[];
    if(currentTab==="vol")fields.push({key:"lastFlight",label:"Dernier Vol",w:5,c:7});
    if(currentTab==="lav")fields.push({key:"lastLavage",label:"Dernier Lavage",w:9,c:14});
    if(currentTab==="pf")fields.push({key:"lastPointFixe",label:"Dernier Point Fixe",w:7,c:9});
    if(currentTab==="tc")fields.push({key:"lastCorrosion",label:"Dernier Trait. Corrosion",w:9,c:14});
    if(currentTab==="lc")fields.push({key:"lastLavComp",label:"Dernier Lav. Compresseur",w:5,c:7});

    fields.forEach(f=>{
      const val=ac[f.key],ago=fmtAgo(val),cls=agoClass(val,f.w,f.c);
      const fp=getPending(ac.immat,f.key);
      h+=`<div class="field-group"><div class="field-label">${f.label}</div>`;
      if(fp)h+=`<div style="background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:10px;padding:10px;text-align:center"><div style="font-size:13px;font-weight:800;color:var(--warn)">⏳ En attente</div><div style="font-size:12px;color:var(--text2);margin-top:4px">Soumis: <strong>${fmtShort(fp.value)}</strong></div></div>`;
      else h+=`<div class="field-row"><input type="date" value="${val||''}" onchange="reqDate('${ac.immat}','${f.key}',this)"><button class="btn-today" onclick="event.stopPropagation();reqToday('${ac.immat}','${f.key}')">Aujourd'hui</button></div><div class="field-info"><span>${fmtFull(val)}</span><span class="ago ${cls}">${ago}</span></div>`;
      h+=`</div>`;
    });

    if((scheduled||doneToday)&&!pending){
      h+=`<button onclick="event.stopPropagation();${doneToday?'':`reqToday('${ac.immat}','${fld}')`}" class="btn-today btn-done" style="width:100%;padding:14px;font-size:14px;border-radius:14px;margin-top:4px;${doneToday?'opacity:.5;pointer-events:none':''}">
        ${doneToday?'✓ Déjà soumis':'✓ Marquer réalisé'}
      </button>`;
    }
    h+=`</div></div>`;
  });
  document.getElementById("acList").innerHTML=h;
}

initFB();
</script>
</body>
</html>
